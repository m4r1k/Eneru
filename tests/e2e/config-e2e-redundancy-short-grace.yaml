# Eneru E2E Test Configuration - Redundancy Group with short connection grace
# Used only for runtime NUT-visibility regression coverage. Production defaults
# remain unchanged; the shortened grace keeps CI runtime bounded.

ups:
  - name: "UPS1@localhost:3493"
    display_name: "E2E UPS1"
    check_interval: 1
    max_stale_data_tolerance: 2
    connection_loss_grace_period:
      enabled: true
      # 30s (down from 40) gives the R1 transient-loss regression headroom
      # for a full ``docker compose restart nut-server`` (bounded with
      # ``-t 2`` in restart_redundancy_nut_server) to complete inside the
      # grace window on slow GHA runners -- the entrypoint alone burns ~4s
      # of fixed startup sleeps before upsd is even probed, so we keep a
      # comfortable cushion here -- while still shaving wall-clock off R2,
      # which holds the loss past this window to verify the fail-safe path.
      # Don't drop below ~25s: the restart-inside-grace requirement is the
      # real floor, not the documented 15s minimum. Production defaults
      # remain unchanged.
      duration: 30
      flap_threshold: 5
  - name: "UPS2@localhost:3493"
    display_name: "E2E UPS2"
    check_interval: 1
    max_stale_data_tolerance: 2
    connection_loss_grace_period:
      enabled: true
      # 30s (down from 40) gives the R1 transient-loss regression headroom
      # for a full ``docker compose restart nut-server`` (bounded with
      # ``-t 2`` in restart_redundancy_nut_server) to complete inside the
      # grace window on slow GHA runners -- the entrypoint alone burns ~4s
      # of fixed startup sleeps before upsd is even probed, so we keep a
      # comfortable cushion here -- while still shaving wall-clock off R2,
      # which holds the loss past this window to verify the fail-safe path.
      # Don't drop below ~25s: the restart-inside-grace requirement is the
      # real floor, not the documented 15s minimum. Production defaults
      # remain unchanged.
      duration: 30
      flap_threshold: 5

triggers:
  low_battery_threshold: 20
  critical_runtime_threshold: 600
  on_battery_stabilization_delay: 0  # E2E legacy tests trigger immediately
  depletion:
    window: 300
    critical_rate: 15.0
    grace_period: 30
  extended_time:
    enabled: false

redundancy_groups:
  - name: "rack-1-dual-psu"
    ups_sources:
      - "UPS1@localhost:3493"
      - "UPS2@localhost:3493"
    min_healthy: 1
    degraded_counts_as: "healthy"
    unknown_counts_as: "critical"
    is_local: false
    remote_servers:
      - name: "E2E SSH Target (redundancy)"
        enabled: true
        host: "localhost"
        user: "testuser"
        connect_timeout: 5
        command_timeout: 10
        shutdown_command: "sudo shutdown -h now"
        ssh_options:
          - "-o Port=2222"
          - "-o StrictHostKeyChecking=no"
          - "-o UserKnownHostsFile=/dev/null"
          - "-o IdentityFile=/tmp/e2e-ssh-key"

behavior:
  dry_run: true

logging:
  file: null
  state_file: "/tmp/eneru-e2e-redundancy-grace-state"
  battery_history_file: "/tmp/eneru-e2e-redundancy-grace-history"
  shutdown_flag_file: "/tmp/eneru-e2e-redundancy-grace-shutdown-flag"

statistics:
  db_directory: "/tmp/eneru-e2e-stats"

notifications:
  enabled: false

local_shutdown:
  enabled: false
  drain_on_local_shutdown: false
  trigger_on: "none"
