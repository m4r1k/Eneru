# E2E Test Environment for Eneru
# Provides: NUT server, SSH target, Docker containers to stop, tmpfs mount

services:
  # NUT Server with dummy driver
  nut-server:
    build:
      context: ./nut-dummy
      dockerfile: Dockerfile
    # Explicit image tag so the pre-built (buildx, gha-cached) image is
    # found under `docker compose up --no-build`. Without it Compose
    # invents a name from the project + service and can't match what
    # buildx --load put in the daemon. See .github/actions/e2e-setup.
    image: eneru-e2e-nut-dummy:ci
    container_name: eneru-e2e-nut
    ports:
      - "3493:3493"
    volumes:
      - ./scenarios:/scenarios:rw
    networks:
      - eneru-e2e

  # SSH target server (simulates remote server for shutdown)
  ssh-target:
    build:
      context: ./ssh-target
      dockerfile: Dockerfile
    # All three ssh-target* services share one build context, so one
    # pre-built image (eneru-e2e-ssh-target:ci) serves all of them.
    image: eneru-e2e-ssh-target:ci
    container_name: eneru-e2e-ssh
    ports:
      - "2222:22"
    volumes:
      # Mount to temp location; entrypoint copies with correct ownership
      - ./ssh-target/authorized_keys:/tmp/host-authorized-keys:ro
    networks:
      - eneru-e2e

  # Additional SSH targets for multi-phase shutdown ordering tests.
  # Identical image to ssh-target, exposed on different host ports so
  # Eneru can address each one independently via SSH.
  ssh-target-2:
    build:
      context: ./ssh-target
      dockerfile: Dockerfile
    image: eneru-e2e-ssh-target:ci
    container_name: eneru-e2e-ssh-2
    ports:
      - "2223:22"
    volumes:
      - ./ssh-target/authorized_keys:/tmp/host-authorized-keys:ro
    networks:
      - eneru-e2e

  ssh-target-3:
    build:
      context: ./ssh-target
      dockerfile: Dockerfile
    image: eneru-e2e-ssh-target:ci
    container_name: eneru-e2e-ssh-3
    ports:
      - "2224:22"
    volumes:
      - ./ssh-target/authorized_keys:/tmp/host-authorized-keys:ro
    networks:
      - eneru-e2e

  # Target containers that Eneru will stop during shutdown sequence.
  # ISS-064: pinned to specific tags (not rolling :alpine / :latest) so PR CI
  # is reproducible — matches the mqtt-broker pin below. Bump deliberately.
  target-nginx:
    image: nginx:1.27-alpine
    container_name: eneru-target-nginx
    networks:
      - eneru-e2e

  target-redis:
    image: redis:7.4-alpine
    container_name: eneru-target-redis
    networks:
      - eneru-e2e

  target-alpine:
    image: alpine:3.20
    container_name: eneru-target-alpine
    command: ["sleep", "infinity"]
    networks:
      - eneru-e2e

  mqtt-broker:
    # Pinned to a specific version so PR CI is reproducible — a moved
    # `:2` floating tag would let upstream Mosquitto changes break our
    # E2E without any local code change. Refresh periodically, or
    # sooner on a security advisory. The `-alpine` variant is ~5x smaller so the
    # CI pull is faster.
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: eneru-e2e-mqtt
    # Bind to loopback only. The broker is anonymous-auth for E2E
    # convenience, so leaking it onto an external interface would let
    # any reachable host publish/subscribe without credentials.
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - eneru-e2e

networks:
  eneru-e2e:
    driver: bridge
