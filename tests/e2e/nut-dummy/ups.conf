# UPS configuration for E2E testing
# Uses the dummy-ups driver to simulate UPSes from files
# Single-UPS mode uses TestUPS; multi-UPS mode uses UPS1 + UPS2

[TestUPS]
    driver = dummy-ups
    port = TestUPS.dev
    desc = "Eneru E2E Test UPS (dummy driver)"

[UPS1]
    driver = dummy-ups
    port = UPS1.dev
    desc = "Eneru E2E Test UPS1 (multi-UPS)"

[UPS2]
    driver = dummy-ups
    port = UPS2.dev
    desc = "Eneru E2E Test UPS2 (multi-UPS)"
