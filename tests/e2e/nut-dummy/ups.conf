# UPS configuration for E2E testing
# Uses the dummy-ups driver to simulate UPSes from files
# Single-UPS mode uses TestUPS; multi-UPS mode uses UPS1 + UPS2
#
# pollinterval = 1: how often dummy-ups re-reads its .dev file. NUT's
# default is ~2s, which is why scenario switches historically needed a
# blind `sleep 3` on the test side. At 1s the driver picks up a swapped
# .dev within ~1s, so the entrypoint watcher can confirm a scenario is
# live and mark it quickly (see entrypoint.sh apply_one / lib.sh
# apply_scenario).

[TestUPS]
    driver = dummy-ups
    port = TestUPS.dev
    pollinterval = 1
    desc = "Eneru E2E Test UPS (dummy driver)"

[UPS1]
    driver = dummy-ups
    port = UPS1.dev
    pollinterval = 1
    desc = "Eneru E2E Test UPS1 (multi-UPS)"

[UPS2]
    driver = dummy-ups
    port = UPS2.dev
    pollinterval = 1
    desc = "Eneru E2E Test UPS2 (multi-UPS)"
