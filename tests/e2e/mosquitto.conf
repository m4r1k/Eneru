# E2E broker config. The 0.0.0.0 listener is intentional: it binds
# inside the container's network namespace, so external reachability
# is governed by the docker-compose host port mapping (which is
# pinned to 127.0.0.1 in tests/e2e/docker-compose.yml). Anonymous
# auth is acceptable only because that mapping prevents off-host
# connections; do not reuse this file outside the E2E harness.
listener 1883 0.0.0.0
allow_anonymous true
persistence false
log_type error
