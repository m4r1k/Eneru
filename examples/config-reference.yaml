# Eneru Configuration Reference
# Comprehensive example with every feature flag documented.
# All sections are optional - features are disabled if not configured.
# When adding new features to Eneru, update this file to include them.

# ==============================================================================
# UPS CONNECTION
# ==============================================================================
ups:
  # UPS identifier in format NAME@HOST or just NAME for local
  name: "UPS@192.168.178.11"
  # Optional human-readable name for logs and notifications
  # display_name: "Homelab UPS"
  # Seconds between status checks
  check_interval: 1
  # Number of stale data attempts before declaring connection lost
  max_stale_data_tolerance: 3

  # Connection loss grace period
  # Suppresses notifications during brief NUT server outages (flaky connections)
  # Does NOT affect failsafe: if on battery when connection is lost, shutdown is immediate
  connection_loss_grace_period:
    # Enable/disable grace period (default: true)
    enabled: true
    # Duration in seconds before sending CONNECTION_LOST notification (default: 60)
    duration: 60
    # Send a warning after this many grace-period recoveries (flaps) within 24h (default: 5)
    flap_threshold: 5

# ==============================================================================
# SHUTDOWN TRIGGERS
# ==============================================================================
triggers:
  # Shutdown when battery percentage falls below this value
  low_battery_threshold: 20

  # Shutdown when estimated runtime falls below this (seconds)
  # 600 = 10 minutes
  critical_runtime_threshold: 600

  # Battery depletion tracking
  depletion:
    # Window for calculating depletion rate (seconds)
    window: 300
    # Shutdown when depletion rate exceeds this (%/minute)
    critical_rate: 15.0
    # Grace period after power loss before enforcing depletion rate (seconds)
    grace_period: 90

  # Extended time on battery safety net
  extended_time:
    # Enable shutdown after extended time on battery
    enabled: true
    # Time threshold (seconds) - 900 = 15 minutes
    threshold: 900

# ==============================================================================
# BEHAVIOR
# ==============================================================================
behavior:
  # Dry-run mode - log actions but don't execute them
  dry_run: false

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  # Log file path (leave empty to disable file logging)
  file: "/var/log/ups-monitor.log"
  # State file for current UPS status
  state_file: "/var/run/ups-monitor.state"
  # Battery history file for depletion tracking
  battery_history_file: "/var/run/ups-battery-history"

# ==============================================================================
# NOTIFICATIONS (via Apprise)
# ==============================================================================
# Apprise supports 100+ notification services
# See: https://github.com/caronc/apprise/wiki
notifications:
  # Optional title - omit or set to null for no title
  # Useful for multi-instance deployments to identify the source system
  title: "⚡ Homelab UPS"  # or null for no title

  # Avatar/icon URL (supported by Discord, Slack, and others)
  avatar_url: "https://raw.githubusercontent.com/m4r1k/Eneru/main/docs/images/eneru-avatar.png"

  # Timeout for notification delivery (seconds)
  timeout: 10

  # ----- Issue #27: alert noise tuning ------------------------------
  # Defer voltage notifications until the condition has held for this
  # many seconds. The state log line is *always* written immediately
  # when voltage_state transitions to HIGH/LOW; only the notification
  # dispatch is deferred. If voltage returns to NORMAL inside the
  # window, no notification fires and the daemon records a
  # `VOLTAGE_FLAP_SUPPRESSED` event for visibility. Default 30s.
  # Set to 0 for the legacy "fire immediately" behavior.
  voltage_hysteresis_seconds: 30

  # Per-event-type notification mute. Logs always record these events
  # (and the SQLite events table records them with notification_sent=0
  # so you can audit what was muted). The list below is examples --
  # any combination of these names is accepted:
  #   POWER_RESTORED, VOLTAGE_NORMALIZED,
  #   AVR_BOOST_ACTIVE, AVR_TRIM_ACTIVE, AVR_INACTIVE,
  #   BYPASS_MODE_INACTIVE, OVERLOAD_RESOLVED, CONNECTION_RESTORED,
  #   VOLTAGE_AUTODETECT_MISMATCH, VOLTAGE_FLAP_SUPPRESSED
  # Safety-critical events CANNOT be muted by design (the config
  # validator rejects them): OVER_VOLTAGE_DETECTED, BROWNOUT_DETECTED,
  # OVERLOAD_ACTIVE, BYPASS_MODE_ACTIVE, ON_BATTERY, CONNECTION_LOST,
  # any SHUTDOWN_*. Use `voltage_hysteresis_seconds` to tame transient
  # voltage flaps; never silence real over-voltage / brownout alerts.
  suppress: []
  # Example -- mute the chatty AVR cycling events but keep everything
  # safety-critical:
  # suppress:
  #   - AVR_BOOST_ACTIVE
  #   - AVR_TRIM_ACTIVE
  #   - AVR_INACTIVE
  # ------------------------------------------------------------------

  # Notification service URLs
  urls:
    # Discord
    - "discord://webhook_id/webhook_token"

    # Telegram
    # - "telegram://bot_token/chat_id"

    # Slack
    # - "slack://token_a/token_b/token_c/#channel"

    # ntfy (self-hosted or ntfy.sh)
    # - "ntfy://topic"
    # - "ntfy://user:password@hostname/topic"

    # Pushover
    # - "pushover://user_key@app_token"

    # Gotify
    # - "gotify://hostname/token"

    # Matrix
    # - "matrix://user:password@hostname/#room"

    # Email
    # - "mailto://user:password@smtp.example.com?to=admin@example.com"

    # Home Assistant
    # - "hassio://hostname/access_token"

    # Generic Webhook
    # - "json://hostname/path"

# ==============================================================================
# LEGACY DISCORD SUPPORT (automatically converted to Apprise)
# ==============================================================================
# If you have an existing Discord configuration, it will be automatically
# converted to use Apprise. You can keep using this format:
#
# discord:
#   webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
#   timeout: 3

# ==============================================================================
# SHUTDOWN SEQUENCE
# ==============================================================================
# Each section can be removed or set to enabled: false to skip

# Virtual Machines (libvirt/KVM)
virtual_machines:
  enabled: true
  # Maximum time to wait for graceful shutdown before force-destroying (seconds)
  max_wait: 30

# Container Runtime (Docker/Podman)
containers:
  enabled: true
  # Runtime to use: "auto", "docker", or "podman"
  # auto = detect available runtime (prefers podman)
  runtime: "auto"
  # Timeout for stop command (seconds)
  stop_timeout: 60

  # Compose files to shutdown (in order, best effort)
  # Each file is processed with 'docker/podman compose -f <path> down'
  # Compose files are stopped BEFORE remaining containers
  # Format: path string or {path: "/path", stop_timeout: 120}
  compose_files:
  #  - "/opt/critical-db/docker-compose.yml"
  #  - path: "/opt/app-stack/docker-compose.yml"
  #    stop_timeout: 120  # Override global timeout for this file

  # After compose files are stopped, shutdown all remaining containers
  # Set to false if you only want to stop compose stacks
  shutdown_all_remaining_containers: true

  # For Podman: stop all user containers as well (rootless)
  # Requires running as root with loginctl enable-linger for each user
  include_user_containers: false

# Filesystem Operations
filesystems:
  # Sync filesystems before shutdown
  sync_enabled: true

  # Unmount configuration
  unmount:
    enabled: true
    # Timeout per mount point (seconds)
    timeout: 15
    # List of mount points to unmount
    # Format: path or {path: "/mnt/path", options: "-l"}
    mounts:
      - "/mnt/media"
      - path: "/mnt/nas"
        options: "-l"  # lazy unmount for network mounts
      - "/mnt/backup"

# Remote Server Shutdown
# Define multiple remote servers to shutdown via SSH
# Each server can have pre_shutdown_commands to gracefully stop services before shutdown
#
# Shutdown ordering:
#   Use shutdown_order to define phases. Servers with the same shutdown_order
#   run in parallel; different orders run sequentially (ascending).
#   A server alone in its order effectively runs sequentially.
#
#   Example: shutdown_order: 1 (compute), 2 (storage), 3 (network)
#
# Legacy mode (no shutdown_order):
#   Servers with parallel: false shutdown sequentially before all parallel: true servers.
#   This is equivalent to shutdown_order for simple two-group setups.
#
# IMPORTANT: shutdown_order and parallel are mutually exclusive.
#   Setting both on the same server is a hard validation error — pick one
#   model per server. Use shutdown_order for multi-phase ordering, or
#   parallel for the legacy two-group behavior.
remote_servers:
  - name: "Synology NAS"
    enabled: true
    host: "192.168.178.229"
    user: "nas-admin"
    # SSH connection timeout (seconds)
    connect_timeout: 10
    # Command execution timeout (seconds) - default for pre_shutdown_commands
    command_timeout: 30
    # Shutdown command (default: "sudo shutdown -h now")
    shutdown_command: "sudo -i synoshutdown -s"
    # SSH options (optional)
    ssh_options:
      - "-o StrictHostKeyChecking=no"
    # Shutdown order (optional, positive integer >= 1)
    # Servers with the same shutdown_order run in parallel.
    # Lower orders run first. A server alone in its order runs sequentially.
    # shutdown_order: 1
    #
    # Legacy alternative: parallel: false
    # Shuts down this server sequentially before the parallel batch.
    # Mutually exclusive with shutdown_order — setting both is a hard error.
    # parallel: false
    #
    # Safety margin (seconds) added on top of (pre_shutdown_commands +
    # command_timeout + connect_timeout) when waiting for this server's
    # parallel-shutdown thread. Covers SSH session setup, OS jitter, and
    # the brief window between the remote shutdown command starting and
    # SSH closing the channel. Default: 60. Tune higher for servers with
    # battery-backed RAID or large flush windows; tune lower for fast VMs.
    # Set to 0 to opt out of the safety buffer entirely.
    # shutdown_safety_margin: 60

  # Example: Proxmox server with VMs and containers
  # stop_proxmox_vms / stop_proxmox_cts run qm and pct via sudo. The SSH user
  # must either be root, or have NOPASSWD sudo for /usr/sbin/qm and /usr/sbin/pct
  # (PVE-level vm.audit + vm.powermgmt are not enough on their own).
  # See docs/remote-servers.md "Passwordless sudo → Proxmox VE".
  # - name: "Proxmox Host"
  #   enabled: true
  #   host: "192.168.178.100"
  #   user: "root"
  #   command_timeout: 30
  #   # Pre-shutdown commands run in order before the final shutdown
  #   # Predefined actions: stop_containers, stop_vms, stop_proxmox_vms,
  #   #   stop_proxmox_cts, stop_xcpng_vms, stop_esxi_vms, stop_compose, sync
  #   pre_shutdown_commands:
  #     - action: "stop_proxmox_vms"
  #       timeout: 120  # Override default timeout
  #     - action: "stop_proxmox_cts"
  #       timeout: 60
  #     - action: "sync"
  #   shutdown_command: "shutdown -h now"

  # Example: Docker server with compose stacks
  # - name: "Docker Server"
  #   enabled: true
  #   host: "192.168.178.101"
  #   user: "root"
  #   pre_shutdown_commands:
  #     - action: "stop_compose"
  #       path: "/opt/myapp/docker-compose.yml"
  #       timeout: 120
  #     - action: "stop_containers"
  #       timeout: 60
  #     - command: "systemctl stop my-critical-service"  # Custom command
  #       timeout: 30
  #     - action: "sync"
  #   shutdown_command: "shutdown -h now"

  # Example: Server with dependency - must shutdown AFTER compute servers
  # - name: "Storage Server"
  #   enabled: true
  #   host: "192.168.178.200"
  #   user: "root"
  #   shutdown_order: 2  # Phase 2: after compute (order 1), before network (order 3)
  #   shutdown_command: "shutdown -h now"

  # Example: Multi-phase shutdown ordering
  # Phase 1: Compute servers shutdown in parallel
  # - name: "App Server 1"
  #   enabled: true
  #   host: "192.168.178.100"
  #   user: "root"
  #   shutdown_order: 1
  #   shutdown_command: "shutdown -h now"
  # - name: "App Server 2"
  #   enabled: true
  #   host: "192.168.178.101"
  #   user: "root"
  #   shutdown_order: 1
  #   shutdown_command: "shutdown -h now"
  # Phase 2: Storage shuts down alone (after compute releases mounts)
  # - name: "Storage Server"
  #   enabled: true
  #   host: "192.168.178.200"
  #   user: "root"
  #   shutdown_order: 2
  #   shutdown_command: "shutdown -h now"
  # Phase 3: Network infrastructure shuts down last
  # - name: "Router"
  #   enabled: true
  #   host: "192.168.178.254"
  #   user: "admin"
  #   shutdown_order: 3
  #   shutdown_command: "shutdown -h now"
  # - name: "Switch"
  #   enabled: true
  #   host: "192.168.178.253"
  #   user: "admin"
  #   shutdown_order: 3
  #   shutdown_command: "shutdown -h now"

# Local Server Shutdown
local_shutdown:
  enabled: true
  # Shutdown command (default: "shutdown -h now")
  command: "shutdown -h now"
  # Additional message for shutdown command
  message: "UPS battery critical - emergency shutdown"
  # Multi-UPS: drain all other groups before local shutdown (default: false)
  # When true, all groups' resources are shut down before the Eneru host shuts down
  drain_on_local_shutdown: false
  # Multi-UPS: when to trigger local shutdown if no UPS is marked is_local
  # "any" = any group's shutdown triggers local shutdown (default)
  # "none" = Eneru host never shuts itself down (recommended for multi-UPS)
  trigger_on: "any"

# ==============================================================================
# STATISTICS (always-on per-UPS SQLite store)
# ==============================================================================
# Eneru records every poll into a per-UPS SQLite database for the TUI's
# graph view and for offline analysis with sqlite3 / DataGrip / Grafana.
# The hot path is in-memory only -- a background writer flushes to disk
# every 10 s, then aggregates+purges every 5 min. Writing is best-effort:
# SQLite errors are logged once and swallowed; monitoring keeps running.
statistics:
  # Directory holding one .db per UPS, named after the sanitized UPS name.
  # On deb/rpm installs this directory is created by the package
  # (mode 0755, root:root). On pip installs the daemon creates it on
  # first start. Relocate it to an SSD/USB stick on devices with slow
  # SD-card storage (Raspberry Pi etc.).
  db_directory: "/var/lib/eneru"
  retention:
    # Raw 1-Hz samples. Older rows are deleted; rolled into agg_5min.
    raw_hours: 24
    # 5-minute aggregations -- 30 days = ~8,640 rows per UPS.
    agg_5min_days: 30
    # Hourly aggregations -- 5 years = ~43,800 rows per UPS.
    agg_hourly_days: 1825

# ==============================================================================
# REDUNDANCY GROUPS (Phase 2)
# ==============================================================================
# Define groups of resources protected by *multiple* UPS sources. Eneru only
# triggers a redundancy-group shutdown when fewer than `min_healthy` member
# UPSes still report a healthy snapshot. UPSes inside a redundancy group keep
# observing on their own threads, but their per-UPS triggers (low_battery,
# critical_runtime, depletion, extended_time) and FSD/FAILSAFE conditions only
# fire as advisory signals -- the group evaluator decides when to act.
#
# Each member UPS *must* still be declared in the top-level `ups:` section
# (single-UPS or multi-UPS list); the redundancy group references them by name.
# A UPS may appear in both an independent UPS group AND a redundancy group.
#
# Across all groups (UPS + redundancy), at most ONE may set is_local: true.
# Only that one group can declare local resources (virtual_machines, containers,
# filesystems). Remote servers may be assigned to either tier, but never both.
#
# redundancy_groups:
#   - name: "dual-psu-rack"
#     # 2+ UPS names from the top-level `ups:` section (must match exactly).
#     ups_sources:
#       - "UPS-A@10.0.0.10"
#       - "UPS-B@10.0.0.11"
#     # Quorum: trigger when healthy_count < min_healthy. For a 2-UPS dual-PSU
#     # setup, min_healthy: 1 means "shut down only when both UPSes fail".
#     min_healthy: 1
#     # How a DEGRADED UPS (e.g., voltage warning, AVR active) counts:
#     #   "healthy"  -- degraded still counts as healthy (default; tolerant)
#     #   "critical" -- degraded counts as failed (strict)
#     degraded_counts_as: "healthy"
#     # How an UNKNOWN UPS (stale snapshot, dropped NUT connection) counts:
#     #   "critical" -- treated as failed (default; fail-safe)
#     #   "degraded" -- counted via degraded_counts_as
#     #   "healthy"  -- assume best (NOT recommended)
#     unknown_counts_as: "critical"
#     # If true, this group can declare local resources (VMs, containers, FS).
#     # At most one group across the whole config may set is_local: true.
#     is_local: false
#     # Optional per-group triggers; inherits from top-level `triggers:` if omitted.
#     # triggers:
#     #   low_battery_threshold: 20
#     #   critical_runtime_threshold: 600
#     # Remote servers shut down when this group's quorum is lost.
#     remote_servers:
#       - name: "Compute Node 1"
#         enabled: true
#         host: "10.0.0.20"
#         user: "root"
#         shutdown_order: 1
#       - name: "Compute Node 2"
#         enabled: true
#         host: "10.0.0.21"
#         user: "root"
#         shutdown_order: 1
#     # Local resources (only valid if is_local: true).
#     # virtual_machines:
#     #   enabled: true
#     # containers:
#     #   enabled: true
#     # filesystems:
#     #   sync_enabled: true
