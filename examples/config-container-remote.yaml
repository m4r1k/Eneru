# Remote-only container image starter config.
# Mount your own file at /etc/ups-monitor/config.yaml in production.
#
# For full local-host ownership FROM a container (host poweroff, local VM
# teardown, local container stop, filesystem sync), see
# examples/config-container-local.yaml and docs/install-comparison.md.
# That path uses an is_host_loopback SSH delegate so the namespace
# barrier doesn't block the host-poweroff contract.
ups:
  - name: "UPS@nut-server"
    display_name: "Container UPS"
    is_local: false
    # Uncomment and adapt to drive remote shutdowns from this Eneru container.
    # The ssh_key_path below points at a file mounted from a Kubernetes Secret
    # or a Docker bind mount so the private key never lives in the image.
    # No ssh_options are needed: Eneru defaults remotes to
    # StrictHostKeyChecking=accept-new and records each host key in
    # /var/lib/eneru/ssh/known_hosts for Docker/Podman containers, so trust
    # survives container recreates. Keep the SSH bind mount persistent and
    # writable; the private key file itself should stay mode 0400.
    # remote_servers:
    #   - name: "nas"
    #     enabled: true
    #     host: "nas.example.lan"
    #     user: "ups"
    #     ssh_key_path: "/var/lib/eneru/ssh/id_eneru"
    #     shutdown_command: "sudo shutdown -h now"

local_shutdown:
  enabled: false
  trigger_on: none

logging:
  # Forensic log file. Mount a volume at /var/log/eneru so this survives
  # container restarts; set to null to disable file logging entirely and
  # rely on `docker logs` / `kubectl logs` only.
  file: "/var/log/eneru/ups-monitor.log"
  state_file: "/var/run/eneru/ups-monitor.state"
  battery_history_file: "/var/run/eneru/ups-battery-history"
  shutdown_flag_file: "/var/run/eneru/ups-shutdown-scheduled"

statistics:
  db_directory: "/var/lib/eneru"

api:
  enabled: true
  bind: "0.0.0.0"
  port: 9191
  # Dashboard / write authentication (opt-in). Leave this block out and the API
  # stays read-only: reads are open, writes (UPS control, config reload) are
  # hard-disabled, and the dashboard Sign-in button is hidden.
  #
  # To enable login + control, create a user and either set `enabled: true`
  # below or simply leave `enabled` unset — when the auth DB already has users
  # and you have not pinned `enabled`, the daemon turns auth on automatically
  # and logs it. UPS control (`nut_control.enabled: true`) always requires an
  # explicit `enabled: true` here.
  #
  #   docker exec <container> eneru user create admin --generate
  #
  # auth:
  #   enabled: true
  #   require_for_reads: false   # set true to also gate read endpoints
  #   session_ttl: 3600
  #   db_path: "/var/lib/eneru/auth.db"
