apiVersion: v1
kind: ConfigMap
metadata:
  name: eneru-config
data:
  config.yaml: |
    ups:
      - name: "UPS@nut.default.svc.cluster.local"
        display_name: "Remote UPS"
        is_local: false
        remote_servers:
          - name: "nas"
            enabled: true
            host: "nas.example.lan"
            user: "ups"
            ssh_key_path: "/var/lib/eneru/ssh/id_ups_shutdown"
            shutdown_command: "sudo shutdown -h now"
    local_shutdown:
      enabled: false
      trigger_on: none
    logging:
      file: null
      state_file: "/var/run/eneru/ups-monitor.state"
      battery_history_file: "/var/run/eneru/ups-battery-history"
      shutdown_flag_file: "/var/run/eneru/ups-shutdown-scheduled"
    statistics:
      db_directory: "/var/lib/eneru"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eneru-state
spec:
  # Persists the writable state volume across pod restarts: the stats SQLite
  # DB, the auth DB, and the accept-new known_hosts file. The SSH private key
  # stays a read-only Secret; only this writable claim persists.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: ""   # pin a class here, or omit to use the cluster default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eneru
spec:
  replicas: 1
  # Singleton owning a ReadWriteOnce PVC: terminate the old pod before the new
  # one starts so the two never contend for the volume during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: eneru
  template:
    metadata:
      labels:
        app: eneru
    spec:
      # This network-exposed pod never calls the Kubernetes API, so don't mount
      # a ServiceAccount token it would only sit on as an unused credential.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: eneru
          # ISS-053: pin to a released version, not :latest. :latest +
          # imagePullPolicy: Always gives every pod restart a surprise upgrade
          # in production. Bump this tag deliberately when you upgrade; the
          # default IfNotPresent pull policy then applies for a tagged image.
          image: ghcr.io/m4r1k/eneru:6.1.6
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            - run
            - --config
            - /etc/ups-monitor/config.yaml
            - --api
            - --api-bind
            - 0.0.0.0
            - --api-port
            - "9191"
          env:
            # /var/lib/eneru/ssh is a read-only Secret mount in Kubernetes.
            # Store learned accept-new host keys on the writable state PVC.
            - name: ENERU_SSH_KNOWN_HOSTS_FILE
              value: /var/lib/eneru/known_hosts
          ports:
            - name: http
              containerPort: 9191
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/ups-monitor/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: state
              mountPath: /var/lib/eneru
            - name: runtime
              mountPath: /var/run/eneru
            - name: logs
              mountPath: /var/log/eneru
            - name: tmp
              mountPath: /tmp
            - name: ssh-key
              mountPath: /var/lib/eneru/ssh
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: eneru-config
        - name: state
          persistentVolumeClaim:
            claimName: eneru-state
        - name: runtime
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: ssh-key
          secret:
            secretName: eneru-ssh-key
            defaultMode: 0400
