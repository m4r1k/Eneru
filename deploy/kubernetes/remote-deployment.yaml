apiVersion: v1
kind: ConfigMap
metadata:
  name: eneru-config
data:
  config.yaml: |
    ups:
      - name: "UPS@nut.default.svc.cluster.local"
        display_name: "Remote UPS"
        is_local: false
        remote_servers:
          - name: "nas"
            enabled: true
            host: "nas.example.lan"
            user: "ups"
            ssh_key_path: "/var/lib/eneru/ssh/id_ups_shutdown"
            shutdown_command: "sudo shutdown -h now"
    local_shutdown:
      enabled: false
      trigger_on: none
    logging:
      file: null
      state_file: "/var/run/eneru/ups-monitor.state"
      battery_history_file: "/var/run/eneru/ups-battery-history"
      shutdown_flag_file: "/var/run/eneru/ups-shutdown-scheduled"
    statistics:
      db_directory: "/var/lib/eneru"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eneru
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eneru
  template:
    metadata:
      labels:
        app: eneru
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: eneru
          image: ghcr.io/m4r1k/eneru:5.4.0
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --config
            - /etc/ups-monitor/config.yaml
            - --api
            - --api-bind
            - 0.0.0.0
            - --api-port
            - "9191"
          ports:
            - name: http
              containerPort: 9191
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/ups-monitor/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: state
              mountPath: /var/lib/eneru
            - name: runtime
              mountPath: /var/run/eneru
            - name: ssh-key
              mountPath: /var/lib/eneru/ssh
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: eneru-config
        - name: state
          emptyDir: {}
        - name: runtime
          emptyDir: {}
        - name: ssh-key
          secret:
            secretName: eneru-ssh-key
            defaultMode: 0400
