apiVersion: v1
kind: Pod
metadata:
  name: eneru
  labels:
    app: eneru
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  containers:
    - name: eneru
      image: ghcr.io/m4r1k/eneru:latest
      imagePullPolicy: Always
      args:
        - run
        - --config
        - /etc/ups-monitor/config.yaml
        - --api
        - --api-bind
        - 0.0.0.0
      ports:
        - name: http
          containerPort: 9191
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      livenessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 45
      readinessProbe:
        httpGet:
          path: /ready
          port: http
        initialDelaySeconds: 45
      volumeMounts:
        - name: config
          mountPath: /etc/ups-monitor/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: state
          mountPath: /var/lib/eneru
        - name: runtime
          mountPath: /var/run/eneru
        - name: logs
          mountPath: /var/log/eneru
  volumes:
    - name: config
      configMap:
        name: eneru-config
    - name: state
      emptyDir: {}
    - name: runtime
      emptyDir: {}
    - name: logs
      emptyDir: {}
