apiVersion: v1
kind: Pod
metadata:
  name: eneru
  labels:
    app: eneru
spec:
  # This network-exposed pod never calls the Kubernetes API, so don't mount
  # a ServiceAccount token it would only sit on as an unused credential.
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  containers:
    - name: eneru
      # ISS-053: pin to a released version, not :latest (see remote-deployment.yaml).
      image: ghcr.io/m4r1k/eneru:6.1.6
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      args:
        - run
        - --config
        - /etc/ups-monitor/config.yaml
        - --api
        - --api-bind
        - 0.0.0.0
        - --api-port
        - "9191"
      env:
        # /var/lib/eneru/ssh is a read-only Secret mount in Kubernetes.
        # Store learned accept-new host keys on the writable state volume.
        - name: ENERU_SSH_KNOWN_HOSTS_FILE
          value: /var/lib/eneru/known_hosts
      ports:
        - name: http
          containerPort: 9191
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      livenessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 45
      readinessProbe:
        httpGet:
          path: /ready
          port: http
        initialDelaySeconds: 45
      volumeMounts:
        - name: config
          mountPath: /etc/ups-monitor/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: state
          mountPath: /var/lib/eneru
        - name: runtime
          mountPath: /var/run/eneru
        - name: logs
          mountPath: /var/log/eneru
        - name: tmp
          mountPath: /tmp
        - name: ssh-key
          mountPath: /var/lib/eneru/ssh
          readOnly: true
  volumes:
    - name: config
      configMap:
        # ISS-053: the `eneru-config` ConfigMap is NOT defined in this file —
        # it lives in remote-deployment.yaml. Apply that manifest first, or
        # copy its ConfigMap block here, before applying this Pod. (Mirrors
        # the eneru-ssh-key Secret note elsewhere in these manifests.)
        name: eneru-config
    # Ephemeral: fine for a throwaway Pod, but accept-new host-key trust
    # (/var/lib/eneru/known_hosts) and the stats/auth DBs are re-learned/reset
    # on every restart. For persistence use a PersistentVolumeClaim here, as in
    # remote-deployment.yaml.
    - name: state
      emptyDir: {}
    - name: runtime
      emptyDir: {}
    - name: logs
      emptyDir: {}
    - name: tmp
      emptyDir: {}
    - name: ssh-key
      secret:
        secretName: eneru-ssh-key
        defaultMode: 0400
