name: "E2E setup"
description: >-
  Brings up the docker-compose environment used by every E2E group:
  installs Eneru + nut-client, generates SSH keys, builds containers,
  waits for NUT and SSH to come online, and provisions /var/lib/eneru.
  All four E2E matrix jobs invoke this action so they share an
  identical, isolated test environment.

# All third-party action invocations are SHA-pinned (with the
# corresponding tag in a comment) so a moved tag in the upstream
# action repo cannot silently change what runs in CI. Refresh
# periodically by re-running
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` (or, for branch-
# tracked actions, `gh api repos/<owner>/<repo>/branches/<branch>`)
# and updating both the SHA and the comment in lockstep across every
# workflow.

inputs:
  e2e-dir:
    description: "Path to the tests/e2e directory inside the repo"
    default: "tests/e2e"
    required: false

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: '3.11'

    - name: Install Eneru
      shell: bash
      run: pip install ".[notifications,mqtt,auth]"

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y nut-client openssh-client mosquitto-clients

    - name: Generate SSH keys for E2E tests
      shell: bash
      run: |
        ssh-keygen -t ed25519 -f /tmp/e2e-ssh-key -N "" -C "eneru-e2e-test"
        mkdir -p ${{ inputs.e2e-dir }}/ssh-target
        cp /tmp/e2e-ssh-key.pub ${{ inputs.e2e-dir }}/ssh-target/authorized_keys

    - name: Build and start E2E environment
      shell: bash
      run: |
        cd ${{ inputs.e2e-dir }}
        docker compose up -d --build
        docker compose ps

    - name: Wait for services to be ready
      shell: bash
      run: |
        echo "Waiting for NUT server..."
        nut_ready=false
        for i in {1..30}; do
          if upsc TestUPS@localhost:3493 2>/dev/null | grep -q "ups.status"; then
            echo "NUT server ready!"
            nut_ready=true
            break
          fi
          echo "  Attempt $i/30..."
          sleep 2
        done
        if [ "$nut_ready" != "true" ]; then
          echo "ERROR: NUT server never became ready (TestUPS@localhost:3493)" >&2
          exit 1
        fi

        echo ""
        echo "Waiting for SSH servers (ports 2222, 2223, 2224)..."
        for port in 2222 2223 2224; do
          ssh_ready=false
          for i in {1..30}; do
            if nc -z localhost "$port" 2>/dev/null; then
              echo "  SSH server on $port ready!"
              ssh_ready=true
              break
            fi
            echo "  Attempt $i/30 for $port..."
            sleep 2
          done
          if [ "$ssh_ready" != "true" ]; then
            echo "ERROR: SSH server on port $port never became ready" >&2
            exit 1
          fi
        done

        echo ""
        echo "Waiting for MQTT broker..."
        # A bare `nc -z` only proves the listener has bound the
        # socket; the broker can still be inside its own startup
        # window where CONNECT is rejected. mosquitto_pub forces a
        # real CONNECT/PUBLISH round-trip. We wrap it in `timeout`
        # rather than mosquitto_pub's own `-W` flag because in
        # mosquitto-clients 2.0.x `-W` is a per-message confirmation
        # timeout for QoS 1/2 and behaves unreliably with QoS 0 +
        # an unauthenticated broker; GNU timeout is unambiguous.
        # stderr is left attached so a future failure is diagnosable
        # without re-running CI in debug mode.
        mqtt_ready=false
        for i in {1..30}; do
          if timeout 3 mosquitto_pub -h 127.0.0.1 -p 1883 \
              -t eneru/e2e/ready -m ok; then
            echo "  MQTT broker ready!"
            mqtt_ready=true
            break
          fi
          echo "  Attempt $i/30..."
          sleep 2
        done
        if [ "$mqtt_ready" != "true" ]; then
          echo "ERROR: MQTT broker never became ready (127.0.0.1:1883)" >&2
          exit 1
        fi

        echo ""
        echo "=== E2E Environment Ready ==="
        upsc TestUPS@localhost:3493 2>/dev/null | head -15

    - name: Create tmpfs mount for unmount testing
      shell: bash
      run: |
        sudo mkdir -p /tmp/eneru-e2e-tmpfs
        sudo mount -t tmpfs -o size=1M tmpfs /tmp/eneru-e2e-tmpfs
        echo "test data" | sudo tee /tmp/eneru-e2e-tmpfs/testfile
        mount | grep eneru-e2e-tmpfs

    - name: Provision /var/lib/eneru (mirror deb/rpm install)
      shell: bash
      run: |
        # nFPM creates /var/lib/eneru at deb/rpm install time (see
        # nfpm.yaml). The unprivileged GH runner can't write there
        # by default, which silently disables stats persistence and
        # spams "stats store open failed" warnings across every
        # e2e test. Provisioning here mirrors the production install
        # path so tests exercise the same code users will hit.
        sudo mkdir -p /var/lib/eneru
        sudo chown "$USER":"$USER" /var/lib/eneru
        sudo chmod 0755 /var/lib/eneru
        ls -ld /var/lib/eneru

    - name: Test SSH connectivity
      shell: bash
      run: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -i /tmp/e2e-ssh-key -p 2222 testuser@localhost \
          "echo 'SSH connection successful!'"
