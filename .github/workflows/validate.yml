name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ISS-042: least-privilege token. This workflow only reads the repo and runs
# tests; the Codecov upload uses its own CODECOV_TOKEN, not GITHUB_TOKEN.
permissions:
  contents: read

# All third-party action invocations are SHA-pinned (with the
# corresponding tag in a comment) so a moved tag in the upstream
# action repo cannot silently change what runs in CI. Refresh
# periodically by re-running
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` (or, for branch-
# tracked actions like pypa/gh-action-pypi-publish@release/v1,
# `gh api repos/<owner>/<repo>/branches/<branch>`) and updating both
# the SHA and the comment in lockstep across every workflow.
jobs:
  validate:
    runs-on: ubuntu-latest
    # ISS-042: a hung test run should fail fast, not sit on the 6h default.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Reduced matrix on PRs for fast/cheap feedback; full matrix on
        # push to main so a version-specific break is still caught before
        # release. The span ends (3.9, 3.12) plus the prerelease (3.15-dev,
        # allowed to fail) cover the common cases on PRs.
        #
        # OPERATOR ACTION when v6.1 merges: make ONLY the `3.9` and `3.12`
        # validate checks required in branch protection. The other versions
        # run on push-to-main (and as non-required PR jobs) but must not be
        # listed as required checks, or PRs wedge on "expected, never
        # reported" for the versions a PR doesn't run. Tradeoff: a
        # 3.10/3.11/3.13/3.14-only break is caught at merge-to-main, not on
        # the PR.
        python-version: ${{ (github.event_name == 'pull_request' && fromJSON('["3.9","3.12","3.15-dev"]')) || fromJSON('["3.9","3.10","3.11","3.12","3.13","3.14","3.15-dev"]') }}
    continue-on-error: ${{ matrix.python-version == '3.15-dev' }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install dependencies
      # ISS-043/044: one dependency source of truth. Install the `dev` extra
      # (pytest + xdist + cov + mock + timeout + playwright) plus every
      # optional feature extra so the paho-mqtt-present code path is actually
      # exercised in CI, instead of hand-picking a subset that drifts from
      # pyproject.
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,notifications,auth,mqtt]"
        python -c "import paho.mqtt; print('paho-mqtt', paho.mqtt.__version__)"

    - name: Run tests
      # --timeout (pytest-timeout, from the dev extra) is the CI backstop for a
      # hung test; the per-test `timeout` marker overrides it where needed.
      run: |
        pytest -n auto --timeout=120 --cov=src/eneru \
          --cov-report=xml --cov-report=json --cov-report=term

    - name: Enforce per-file coverage bar (>=95%)
      # ISS-012: AGENTS.md mandates >=95% line+branch per file, but nothing
      # enforced it (no --cov-fail-under; Codecov informational). Gate it on the
      # 3.12 lane (the one that also uploads coverage) so a regression cannot
      # merge green. One enforcing lane avoids duplicate noise across the matrix.
      if: matrix.python-version == '3.12'
      run: |
        python - <<'PY'
        import json, sys
        bar = 95.0
        data = json.load(open("coverage.json"))
        offenders = [
            (m["summary"]["percent_covered"], path)
            for path, m in sorted(data["files"].items())
            if m["summary"]["percent_covered"] < bar
        ]
        total = data["totals"]["percent_covered"]
        if total < bar:
            offenders.append((total, "TOTAL"))
        if offenders:
            print(f"::error::coverage below {bar}% (line+branch):")
            for pct, path in offenders:
                print(f"  {pct:6.2f}%  {path}")
            sys.exit(1)
        print(f"All files >= {bar}% per file (total {total:.2f}%).")
        PY

    - name: Upload coverage to Codecov
      # 3.12 is in both the reduced PR matrix and the full push matrix, so
      # coverage uploads on PRs as well as on main.
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Validate example configs
      run: |
        for config in examples/*.yaml; do
          echo "Validating $config..."
          python -m eneru validate --config "$config"
        done

    - name: Validate embedded Kubernetes ConfigMap config
      # ISS-053: the config.yaml baked into deploy/kubernetes/*.yaml was
      # validated by no CI job, so it could drift from the schema silently.
      # Extract every ConfigMap's config.yaml and run the real validator on it.
      run: |
        python - <<'PY'
        import glob, pathlib, subprocess, sys, tempfile, yaml
        failures = 0
        for manifest in sorted(glob.glob("deploy/kubernetes/*.yaml")):
            for doc in yaml.safe_load_all(pathlib.Path(manifest).read_text()):
                if not isinstance(doc, dict) or doc.get("kind") != "ConfigMap":
                    continue
                cfg = (doc.get("data") or {}).get("config.yaml")
                if not cfg:
                    continue
                name = doc.get("metadata", {}).get("name", "?")
                print(f"Validating ConfigMap {name} in {manifest}...")
                with tempfile.NamedTemporaryFile(
                    "w", suffix=".yaml", delete=False
                ) as tf:
                    tf.write(cfg)
                    path = tf.name
                rc = subprocess.call(
                    [sys.executable, "-m", "eneru", "validate", "--config", path]
                )
                failures += rc != 0
        sys.exit(1 if failures else 0)
        PY
