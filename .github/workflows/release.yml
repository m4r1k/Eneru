      - name: Deploy to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update repository for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          # No --force: a non-fast-forward push (e.g. concurrent release
          # job already updated gh-pages) should fail loudly so the
          # operator can decide how to reconcile, not silently clobber.
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Code Version:** ${{ steps.version.outputs.VERSION_FULL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ steps.channel.outputs.CHANNEL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages Built" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la -- ./*.deb ./*.rpm >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stable Packages" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          # ISS-064: group the ls + fallback so the "No ... packages" line also
          # lands in the step summary. With `ls >> SUMMARY || echo ...`, the
          # fallback echoes to stdout (job log) instead, leaving a bare ``` ```
          # block in the summary whenever a pool is empty.
          { ls -la gh-pages/deb/pool/main/*.deb 2>/dev/null || echo "No stable deb packages"; } >> "$GITHUB_STEP_SUMMARY"
          { ls -la gh-pages/rpm/*.rpm 2>/dev/null || echo "No stable rpm packages"; } >> "$GITHUB_STEP_SUMMARY"
          { ls -la gh-pages/rpm/el8/*.rpm 2>/dev/null || echo "No stable el8 rpm packages"; } >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Testing Packages" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          { ls -la gh-pages/deb/pool/testing/*.deb 2>/dev/null || echo "No testing deb packages"; } >> "$GITHUB_STEP_SUMMARY"
          { ls -la gh-pages/rpm/testing/*.rpm 2>/dev/null || echo "No testing rpm packages"; } >> "$GITHUB_STEP_SUMMARY"
          { ls -la gh-pages/rpm/testing/el8/*.rpm 2>/dev/null || echo "No testing el8 rpm packages"; } >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Package Repository" >> $GITHUB_STEP_SUMMARY
          echo "Published to: https://m4r1k.github.io/Eneru/" >> $GITHUB_STEP_SUMMARY

  # F-015: prove the PUBLISHED repo metadata is actually installable-from, so a
  # metadata regression (Packages/Release/repomd, signing, sources line) fails
  # the release instead of shipping green. Minimal by design: add the just-
  # deployed repo in a clean container, `install eneru`, run `eneru version`.
  # `needs: build-packages` gates this on the gh-pages deploy step succeeding.
  # All matrix smokes run in PARALLEL so wall-clock barely moves.
  # cubic round 1: (a) the readiness probe waits until the repo ADVERTISES the
  # just-built version — KEY.gpg is a long-lived file that survives from prior
  # releases, so its mere reachability proved nothing about THIS deploy; (b)
  # the INSTALLED binary's version is asserted against the built version, so a
  # stale-metadata install can't pass the gate; (c) el8 gets its own matrix
  # leg — its repo (rpm/el8) has separate createrepo/signing/.repo plumbing
  # that the default-path smoke never exercised.
  smoke-install:
    name: Smoke install from published repo (${{ matrix.pkg }})
    needs: build-packages
    # Only meaningful once packages have actually been published to gh-pages.
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: apt
            image: debian:13
          - pkg: dnf
            image: registry.access.redhat.com/ubi9/ubi
            el: '9'
            repo_stable: rpm/eneru.repo
            repo_testing: rpm/testing/eneru-testing.repo
          - pkg: dnf-el8
            image: registry.access.redhat.com/ubi8/ubi
            el: '8'
            repo_stable: rpm/el8/eneru-el8.repo
            repo_testing: rpm/testing/el8/eneru-testing-el8.repo
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install from published repo and verify
        env:
          CHANNEL: ${{ needs.build-packages.outputs.channel }}
          VERSION: ${{ needs.build-packages.outputs.version }}
          VERSION_FULL: ${{ needs.build-packages.outputs.version_full }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -eux
          # GitHub Pages serves gh-pages at https://<owner-lower>.github.io/<repo>.
          HOST="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]').github.io"
          BASE="https://${HOST}/${REPO_NAME}"
          # Package ecosystems spell pre-release versions with ~ where the git
          # tag uses - (6.1.7-rc1 -> 6.1.7~rc1 in both deb and rpm).
          PKG_VERSION="$(printf '%s' "$VERSION" | tr '-' '~')"

          # gh-pages redeploys asynchronously after the push. KEY.gpg only
          # proves the SITE is serving (it survives from prior releases), so
          # this gates reachability; deploy FRESHNESS is gated separately by
          # the advertised-version poll below.
          wait_for_pages() {
            for i in $(seq 1 30); do
              if curl -fsSL "${BASE}/KEY.gpg" -o /tmp/eneru-key.gpg; then
                echo "Repo reachable after attempt ${i}."; return 0
              fi
              echo "Attempt ${i}: gh-pages not ready; sleeping 10s..."; sleep 10
            done
            echo "::error::Published repo did not become reachable in time."; return 1
          }

          if [ "${{ matrix.pkg }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y ca-certificates curl gnupg
            wait_for_pages
            gpg --dearmor < /tmp/eneru-key.gpg > /usr/share/keyrings/eneru.gpg
            SUITE=stable
            [ "$CHANNEL" = "testing" ] && SUITE=testing
            echo "deb [arch=all signed-by=/usr/share/keyrings/eneru.gpg] ${BASE}/deb ${SUITE} main" \
              > /etc/apt/sources.list.d/eneru.list
            # Freshness gate: wait until the repo advertises the version THIS
            # run built, not whatever Pages still caches from the last release.
            # 10-min window (matches the dnf leg): Pages CDN propagation can
            # straggle past 5 minutes.
            for i in $(seq 1 60); do
              apt-get update >/dev/null 2>&1 || true
              if apt-cache policy eneru | grep -qF "$PKG_VERSION"; then
                echo "Repo advertises ${PKG_VERSION} after attempt ${i}."; break
              fi
              if [ "$i" = "60" ]; then
                echo "::error::Repo never advertised ${PKG_VERSION}."; exit 1
              fi
              echo "Attempt ${i}: repo metadata still stale; sleeping 10s..."; sleep 10
            done
            apt-get install -y eneru
          else
            # dnf smoke. ubi9 (python3 == 3.9) exercises the DEFAULT rpm/ repo;
            # ubi8 exercises the DEDICATED el8 repo, whose RPM must pull the
            # python39 module through its own declared deps (F-013).
            # EPEL provides nut-client (a hard dep of the RPM).
            dnf install -y "https://dl.fedoraproject.org/pub/epel/epel-release-latest-${{ matrix.el }}.noarch.rpm"
            wait_for_pages
            if [ "$CHANNEL" = "testing" ]; then
              curl -fsSL "${BASE}/${{ matrix.repo_testing }}" -o /etc/yum.repos.d/eneru.repo
            else
              curl -fsSL "${BASE}/${{ matrix.repo_stable }}" -o /etc/yum.repos.d/eneru.repo
            fi
            # Freshness gate (same reasoning as the apt leg). -y is LOAD-BEARING:
            # eneru.repo sets repo_gpgcheck=1, so the first metadata fetch must
            # import the signing key, and dnf PROMPTS for that import. Without
            # -y the non-interactive prompt is refused, dnf fails with "Bad GPG
            # signature", and 2>/dev/null makes every attempt look like stale
            # metadata — the gate can never pass (v6.1.7 release run failed
            # twice this way while the repo was demonstrably fine). The window
            # is also 10 min, not 5: Pages CDN propagation can straggle.
            for i in $(seq 1 60); do
              if dnf -y --refresh -q info eneru 2>/dev/null | grep -qF "$PKG_VERSION"; then
                echo "Repo advertises ${PKG_VERSION} after attempt ${i}."; break
              fi
              if [ "$i" = "60" ]; then
                echo "::error::Repo never advertised ${PKG_VERSION}."; exit 1
              fi
              echo "Attempt ${i}: repo metadata still stale; sleeping 10s..."; sleep 10
            done
            dnf install -y eneru
          fi

          # The real gate: source stamping includes the git hash, so require the
          # exact code version from this run. A stale stable package must not
          # satisfy a release-candidate smoke by sharing its numeric core.
          ACTUAL="$(eneru version)"
          printf '%s\n' "$ACTUAL"
          test "$ACTUAL" = "Eneru v${VERSION_FULL}"
