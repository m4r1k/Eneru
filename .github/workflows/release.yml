name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 5.1.1 or 5.1.1-rc1)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (tag, branch, or commit SHA)'
        required: true
        type: string
        default: 'main'

# All third-party action invocations are SHA-pinned (with the
# corresponding tag in a comment) so a moved tag in the upstream
# action repo cannot silently change what runs in CI. Refresh
# periodically by re-running
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` (or, for branch-
# tracked actions like pypa/gh-action-pypi-publish@release/v1,
# `gh api repos/<owner>/<repo>/branches/<branch>`) and updating both
# the SHA and the comment in lockstep across every workflow.
#
# nFPM is pinned + checksum-verified; bump NFPM_VERSION here to refresh.
env:
  NFPM_VERSION: "2.41.3"

# Serialize gh-pages deploys so concurrent releases (e.g. a tag push
# overlapping with a manual workflow_dispatch, or two rc cuts close
# together) don't both rebuild + sign packages and then race the
# non-fast-forward push at the end. cancel-in-progress: false so the
# winner finishes; the second run waits for the first to complete.
concurrency:
  group: release-gh-pages
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-packages:
    runs-on: ubuntu-latest
    # F-015: expose the channel/version so the post-deploy smoke job can install
    # from the correct (stable vs testing) just-published repo.
    outputs:
      channel: ${{ steps.channel.outputs.CHANNEL }}
      version: ${{ steps.version.outputs.VERSION }}
      version_full: ${{ steps.version.outputs.VERSION_FULL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          # ISS-010 (minimal hardening): this job pip-installs the full
          # dependency tree and runs pytest before any publish step, so don't
          # leave the contents:write+packages:write GITHUB_TOKEN sitting in
          # .git/config while untrusted dep code runs. Every credentialed
          # operation below (docker login, gh release, gh-pages push) passes
          # the token explicitly via env/URL and is unaffected.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # ISS-043/044: same single source of truth as validate.yml — the
        # release gate must run the identical dependency set (incl. mqtt) it
        # ships, not a narrower hand-picked subset.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,notifications,auth,mqtt]"

      - name: Run tests
        run: pytest -v --timeout=120

      - name: Validate configuration
        run: python -m eneru validate --config examples/config-reference.yaml

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger — use input version
            VERSION="$INPUT_VERSION"
          else
            # Release trigger — extract from tag (e.g., v4.3.0 -> 4.3.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          # ISS-064: validate BOTH paths with the same strict allow-list. The
          # version is interpolated into `sed` and other shell calls below, and
          # a hand-typed or mis-pushed tag (e.g. `v6.1.6 `, `v6.1.6-foo`) must
          # be rejected here rather than corrupting a package name downstream.
          # PEP-440-style release or pre-release (rc/alpha/beta) only.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}(-(rc|alpha|beta)[0-9]+)?$'; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          # Get short commit hash for code version
          SHORT_HASH=$(git rev-parse --short HEAD)
          VERSION_FULL="${VERSION}-${SHORT_HASH}"

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION_FULL=$VERSION_FULL" >> "$GITHUB_OUTPUT"
          echo "Building packages version: $VERSION"
          echo "Code version: $VERSION_FULL"

      - name: Determine channel
        id: channel
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [[ "$VERSION" =~ -(rc|beta|alpha) ]]; then
            CHANNEL="testing"
          else
            CHANNEL="stable"
          fi
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Channel: $CHANNEL for version: $VERSION"

      - name: Update version in script
        env:
          VERSION_FULL: ${{ steps.version.outputs.VERSION_FULL }}
        run: |
          # Update __version__ with full version including git hash
          # This only affects the code display (--version, logs), not package versions
          sed -i "s/^__version__ = .*/__version__ = \"$VERSION_FULL\"/" src/eneru/version.py
          # Verify the change
          grep "__version__" src/eneru/version.py

      - name: Install nFPM
        run: |
          # Pinned version + checksum verification: protect the release
          # path against an upstream tag mutation or in-flight tamper.
          # NFPM_VERSION is set in this workflow's `env:` block.
          BASE="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}"
          ARCHIVE="nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          echo "Installing nFPM ${NFPM_VERSION}"
          curl -sLO "${BASE}/${ARCHIVE}"
          curl -sL "${BASE}/checksums.txt" -o nfpm_checksums.txt
          grep " ${ARCHIVE}\$" nfpm_checksums.txt | sha256sum -c -
          tar -xzf "${ARCHIVE}" nfpm
          sudo mv nfpm /usr/local/bin/
          rm "${ARCHIVE}" nfpm_checksums.txt
          nfpm --version

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }} nfpm package --packager deb --target .
          ls -la -- ./*.deb

      - name: Build .rpm package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }} nfpm package --packager rpm --target .
          ls -la -- ./*.rpm

      - name: Build el8 .rpm package
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # F-013: RHEL 8's system `python3` is 3.6, but Eneru needs 3.9+. The
          # default RPM's unversioned `python3` dep installs cleanly on el8 and
          # then crash-loops. Ship a SEPARATE el8 RPM whose deps require the
          # `python39` module (RHEL 8's 3.9). The el8 config is GENERATED from
          # nfpm.yaml so `contents:` stay single-sourced (and the drift test in
          # tests/test_packaging.py keeps validating the one committed config);
          # only rpm.depends and a distinct `.el8` release marker differ.
          python - <<'PY'
          import yaml
          with open("nfpm.yaml") as f:
              cfg = yaml.safe_load(f)
          rpm = cfg.setdefault("overrides", {}).setdefault("rpm", {})
          rpm["depends"] = ["python39", "python39-pyyaml", "nut-client"]
          # Distinct release marker -> artifact named eneru-<ver>-1.el8.noarch.rpm
          # so it never collides with the default RPM in the published repo.
          cfg["release"] = "1.el8"
          with open("nfpm-el8.yaml", "w") as f:
              yaml.safe_dump(cfg, f, sort_keys=False)
          PY
          nfpm package --packager rpm --target . -f nfpm-el8.yaml
          ls -la -- ./*.el8.*.rpm

      - name: Build OCI image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_NAME="${IMAGE_NAME,,}"
          # Docker installs the copied source with pip, and
          # pyproject.toml derives the package version from this file.
          # Keep the OCI image on the clean release version so the
          # wheel metadata and exact image tag are both valid/simple.
          sed -i "s/^__version__ = .*/__version__ = \"$VERSION\"/" src/eneru/version.py
          grep "__version__" src/eneru/version.py
          docker build --build-arg VERSION="$VERSION" -t "${IMAGE_NAME}:${VERSION}" .

      # F-014: push ONLY the immutable version tag first, verify it below, and
      # only then move the `:latest`/`:testing` channel alias onto it. This
      # keeps a broken build from ever landing on `:latest`/`:testing` while
      # verification fails. F-037: GITHUB_TOKEN and the actor username are passed
      # via env (referenced as "$GITHUB_TOKEN"/"$ACTOR") rather than interpolated
      # into the shell text, so a value containing quotes/backslashes can't break
      # the step or inject shell.
      - name: Push versioned OCI image to GHCR
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          IMAGE_NAME="${IMAGE_NAME,,}"
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
          docker push "${IMAGE_NAME}:${VERSION}"

      - name: Verify pushed OCI image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_NAME="${IMAGE_NAME,,}"
          docker pull "${IMAGE_NAME}:${VERSION}"
          docker run --rm "${IMAGE_NAME}:${VERSION}" version

      # F-014: only now — after the versioned image is verified — promote the
      # channel alias. `docker login` from the push step above persists in the
      # runner's docker config for this job, so no re-login (and no extra
      # wall-clock) is needed. Stable -> `:latest`, pre-release -> `:testing`.
      - name: Promote OCI channel alias
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          CHANNEL: ${{ steps.channel.outputs.CHANNEL }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_NAME="${IMAGE_NAME,,}"
          if [ "$CHANNEL" = "stable" ]; then
            docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:latest"
            docker push "${IMAGE_NAME}:latest"
          else
            docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:testing"
            docker push "${IMAGE_NAME}:testing"
          fi

      - name: Upload packages to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            *.deb
            *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        # F-037: pass the secret via env and reference it as a shell variable
        # rather than interpolating it into the run: text, so a key containing
        # quotes/backslashes can't break the step or inject shell.
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

      # ISS-064: decide up front whether gh-pages exists rather than relying on
      # `continue-on-error` on the checkout. With continue-on-error, a TRANSIENT
      # checkout failure (network, rate limit) on an existing branch would be
      # masked, the next step would init a fresh empty gh-pages, and the final
      # push would OVERWRITE every published package. An explicit ls-remote gate
      # makes "branch missing" the only path that initializes.
      - name: Detect gh-pages branch
        id: ghpages
        run: |
          # ISS-064: distinguish "branch genuinely missing" (ls-remote exit 2)
          # from a transient/auth failure (exit 128). Only a true miss may
          # initialize a fresh gh-pages; any other error ABORTS the release,
          # because initializing on a transient error and then pushing would
          # overwrite every published package.
          set +e
          git ls-remote --exit-code --heads \
            "https://github.com/${{ github.repository }}.git" gh-pages >/dev/null 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 2 ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::git ls-remote for gh-pages failed (exit $rc); aborting to avoid overwriting published packages." >&2
            exit 1
          fi

      - name: Checkout gh-pages branch
        if: steps.ghpages.outputs.exists == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
          # Don't persist GITHUB_TOKEN into gh-pages/.git/config: the "Deploy to
          # gh-pages" step pushes with an explicit x-access-token URL, so the
          # persisted credential is unused and only widens token exposure across
          # the many steps that run inside gh-pages/ (zizmor artipacked).
          persist-credentials: false

      - name: Initialize gh-pages if missing
        if: steps.ghpages.outputs.exists == 'false'
        run: |
          mkdir -p gh-pages
          cd gh-pages
          git init
          git checkout -b gh-pages

      - name: Migrate pre-release packages to testing channel
        run: |
          cd gh-pages

          # One-time migration: move pre-release packages out of stable directories
          # nFPM converts -rc/-beta/-alpha to ~ in package filenames
          # This step is idempotent — becomes a no-op once migration is complete

          # --- APT migration ---
          if [ -d "deb/pool/main" ] && ls deb/pool/main/*.deb 1>/dev/null 2>&1; then
            mkdir -p deb/pool/testing
            for deb in deb/pool/main/*.deb; do
              filename=$(basename "$deb")
              if echo "$filename" | grep -qE '~(rc|beta|alpha)'; then
                echo "Migrating to testing: $filename"
                mv "$deb" deb/pool/testing/
              fi
            done
          fi

          # --- RPM migration ---
          if ls rpm/*.rpm 1>/dev/null 2>&1; then
            mkdir -p rpm/testing
            for rpm_file in rpm/*.rpm; do
              # Skip if it's a directory (rpm/testing/)
              [ -f "$rpm_file" ] || continue
              filename=$(basename "$rpm_file")
              if echo "$filename" | grep -qE '~(rc|beta|alpha)'; then
                echo "Migrating to testing: $filename"
                mv "$rpm_file" rpm/testing/
              fi
            done
          fi

      - name: Prepare repository structure
        run: |
          CHANNEL="${{ steps.channel.outputs.CHANNEL }}"
          cd gh-pages

          # Create directory structure for both channels
          mkdir -p deb/pool/main deb/pool/testing
          mkdir -p deb/dists/stable/main/binary-all deb/dists/testing/main/binary-all
          # F-013: el8 RPMs live in their OWN rpm/el8 (and rpm/testing/el8)
          # sub-repo. Keeping them out of the default rpm/ tree is deliberate:
          # in a flat repo, `dnf install eneru` compares EVR only and would pick
          # the higher-release el8 RPM on RHEL 9/10, dragging in the `python39`
          # module those distros don't ship. Separate baseurls keep the default
          # RPM serving RHEL 9/10 unchanged while el8 users point at rpm/el8.
          mkdir -p rpm rpm/testing rpm/el8 rpm/testing/el8

          shopt -s nullglob
          debs=(../*.deb)
          rpms=(../*.rpm)
          if [ "${#debs[@]}" -ne 1 ] || [ "${#rpms[@]}" -ne 2 ]; then
            echo "Expected exactly one deb and two RPM artifacts; found " \
              "${#debs[@]} deb and ${#rpms[@]} RPM." >&2
            exit 1
          fi

          # Export public GPG key
          gpg --armor --export > KEY.gpg

          # Copy new packages to the correct channel. Route the el8 RPM (named
          # ...el8...rpm) to the el8 sub-repo; everything else to the default.
          if [ "$CHANNEL" = "stable" ]; then
            cp -- "${debs[@]}" deb/pool/main/
            for r in "${rpms[@]}"; do
              case "$r" in
                *.el8.*) cp "$r" rpm/el8/ ;;
                *) cp "$r" rpm/ ;;
              esac
            done
          else
            cp -- "${debs[@]}" deb/pool/testing/
            for r in "${rpms[@]}"; do
              case "$r" in
                *.el8.*) cp "$r" rpm/testing/el8/ ;;
                *) cp "$r" rpm/testing/ ;;
              esac
            done
          fi

      - name: Build APT repository
        run: |
          cd gh-pages/deb

          # Install dpkg-dev for dpkg-scanpackages
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

          # Build metadata for each channel from its own pool
          # stable: pool/main -> dists/stable
          # testing: pool/testing -> dists/testing
          for CHANNEL_INFO in "stable:pool/main:dists/stable" "testing:pool/testing:dists/testing"; do
            CHANNEL_NAME="${CHANNEL_INFO%%:*}"
            REMAINDER="${CHANNEL_INFO#*:}"
            POOL_DIR="${REMAINDER%%:*}"
            DIST_DIR="${REMAINDER#*:}"

            # Skip if pool directory has no packages
            if ! ls "${POOL_DIR}"/*.deb 1>/dev/null 2>&1; then
              echo "No packages in ${POOL_DIR}, skipping ${CHANNEL_NAME} metadata"
              continue
            fi

            echo "Building APT metadata for ${CHANNEL_NAME} from ${POOL_DIR}..."

            # Generate Packages file (paths relative to deb/ directory)
            dpkg-scanpackages --arch all "${POOL_DIR}" /dev/null > "${DIST_DIR}/main/binary-all/Packages"
            gzip -k -f "${DIST_DIR}/main/binary-all/Packages"

            # Generate Release file
            cat > "${DIST_DIR}/Release" <<EOF
          Origin: Eneru
          Label: Eneru
          Suite: ${CHANNEL_NAME}
          Codename: ${CHANNEL_NAME}
          Architectures: all
          Components: main
          Description: Eneru UPS Monitor packages (${CHANNEL_NAME})
          Date: $(date -Ru)
          EOF

            # Add checksums (paths relative to dists/<channel>/)
            cd "${DIST_DIR}"
            {
              echo "MD5Sum:"
              find main -type f \( -name "Packages" -o -name "Packages.gz" \) -exec sh -c 'echo " $(md5sum "$1" | cut -d" " -f1) $(stat -c%s "$1") $1"' _ {} \;
              echo "SHA1:"
              find main -type f \( -name "Packages" -o -name "Packages.gz" \) -exec sh -c 'echo " $(sha1sum "$1" | cut -d" " -f1) $(stat -c%s "$1") $1"' _ {} \;
              echo "SHA256:"
              find main -type f \( -name "Packages" -o -name "Packages.gz" \) -exec sh -c 'echo " $(sha256sum "$1" | cut -d" " -f1) $(stat -c%s "$1") $1"' _ {} \;
            } >> Release

            # Sign the Release file
            gpg --batch --yes --armor --detach-sign -o Release.gpg Release
            gpg --batch --yes --clearsign -o InRelease Release

            # Return to deb/ directory for next iteration
            cd "$GITHUB_WORKSPACE/gh-pages/deb"
          done

      - name: Build RPM repository
        run: |
          # Install createrepo
          sudo apt-get install -y createrepo-c

          # --- Stable RPM repository (rpm/ root — unchanged for backward compat) ---
          # F-013: exclude the el8/ sub-repo (and testing/) so the default repo
          # only ever advertises the default RPM to RHEL 9/10.
          cd gh-pages/rpm
          if ls *.rpm 1>/dev/null 2>&1; then
            echo "Building stable RPM metadata..."
            createrepo_c --excludes='testing/*' --excludes='el8/*' .
            gpg --batch --yes --armor --detach-sign -o repodata/repomd.xml.asc repodata/repomd.xml
          fi

          # Stable repo file (unchanged baseurl for existing users)
          # Note: gpgcheck=0 because individual RPMs are not signed,
          # but repo metadata (repomd.xml) is signed and served over HTTPS
          cat > eneru.repo << 'REPOFILE'
          [eneru]
          name=Eneru UPS Monitor
          baseurl=https://m4r1k.github.io/Eneru/rpm
          enabled=1
          gpgcheck=0
          repo_gpgcheck=1
          gpgkey=https://m4r1k.github.io/Eneru/KEY.gpg
          REPOFILE
          sed -i 's/^          //' eneru.repo

          # --- Stable el8 RPM repository (rpm/el8/) ---
          # F-013: RHEL 8 uses this sub-repo; its RPM requires the python39
          # module (RHEL 8's 3.9) rather than the system python3 (3.6).
          cd "$GITHUB_WORKSPACE/gh-pages/rpm/el8"
          if ls *.rpm 1>/dev/null 2>&1; then
            echo "Building stable el8 RPM metadata..."
            createrepo_c .
            gpg --batch --yes --armor --detach-sign -o repodata/repomd.xml.asc repodata/repomd.xml
          fi

          # el8 repo file (RHEL 8 only)
          cat > eneru-el8.repo << 'REPOFILE'
          [eneru-el8]
          name=Eneru UPS Monitor (RHEL 8)
          baseurl=https://m4r1k.github.io/Eneru/rpm/el8
          enabled=1
          gpgcheck=0
          repo_gpgcheck=1
          gpgkey=https://m4r1k.github.io/Eneru/KEY.gpg
          REPOFILE
          sed -i 's/^          //' eneru-el8.repo

          # --- Testing RPM repository (rpm/testing/) ---
          cd "$GITHUB_WORKSPACE/gh-pages/rpm/testing"
          if ls *.rpm 1>/dev/null 2>&1; then
            echo "Building testing RPM metadata..."
            createrepo_c --excludes='el8/*' .
            gpg --batch --yes --armor --detach-sign -o repodata/repomd.xml.asc repodata/repomd.xml
          fi

          # Testing repo file
          cat > eneru-testing.repo << 'REPOFILE'
          [eneru-testing]
          name=Eneru UPS Monitor (Testing)
          baseurl=https://m4r1k.github.io/Eneru/rpm/testing
          enabled=1
          gpgcheck=0
          repo_gpgcheck=1
          gpgkey=https://m4r1k.github.io/Eneru/KEY.gpg
          REPOFILE
          sed -i 's/^          //' eneru-testing.repo

          # --- Testing el8 RPM repository (rpm/testing/el8/) ---
          cd "$GITHUB_WORKSPACE/gh-pages/rpm/testing/el8"
          if ls *.rpm 1>/dev/null 2>&1; then
            echo "Building testing el8 RPM metadata..."
            createrepo_c .
            gpg --batch --yes --armor --detach-sign -o repodata/repomd.xml.asc repodata/repomd.xml
          fi

          # Testing el8 repo file
          cat > eneru-testing-el8.repo << 'REPOFILE'
          [eneru-testing-el8]
          name=Eneru UPS Monitor (Testing, RHEL 8)
          baseurl=https://m4r1k.github.io/Eneru/rpm/testing/el8
          enabled=1
          gpgcheck=0
          repo_gpgcheck=1
          gpgkey=https://m4r1k.github.io/Eneru/KEY.gpg
          REPOFILE
          sed -i 's/^          //' eneru-testing-el8.repo

      - name: Create index.html
        run: |
          cd gh-pages
          cat > index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Eneru Package Repository</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
              h1 { color: #333; }
              h2 { color: #555; margin-top: 2em; }
              h3 { color: #666; }
              pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
              .section { margin: 30px 0; }
              .note { background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px; padding: 12px; margin: 15px 0; }
            </style>
          </head>
          <body>
            <h1>Eneru Package Repository</h1>
            <p>Official package repository for <a href="https://github.com/m4r1k/Eneru">Eneru</a> - Intelligent UPS Monitoring &amp; Shutdown Orchestration for NUT.</p>

            <div class="section">
              <h2>Stable Releases</h2>

              <h3>Debian / Ubuntu</h3>
              <pre>
          # Import GPG key
          curl -fsSL https://m4r1k.github.io/Eneru/KEY.gpg | sudo gpg --dearmor -o /usr/share/keyrings/eneru.gpg

          # Add repository
          echo "deb [arch=all signed-by=/usr/share/keyrings/eneru.gpg] https://m4r1k.github.io/Eneru/deb stable main" | sudo tee /etc/apt/sources.list.d/eneru.list

          # Install
          sudo apt update
          sudo apt install eneru</pre>

              <h3>RHEL 9/10 / Fedora</h3>
              <pre>
          # RHEL 8/9: Enable EPEL first (required for apprise dependency)
          sudo dnf install -y epel-release

          # Add repository
          sudo curl -o /etc/yum.repos.d/eneru.repo https://m4r1k.github.io/Eneru/rpm/eneru.repo

          # Install
          sudo dnf install eneru</pre>

              <h3>RHEL 8</h3>
              <pre>
          sudo dnf install -y epel-release
          sudo curl -o /etc/yum.repos.d/eneru.repo https://m4r1k.github.io/Eneru/rpm/el8/eneru-el8.repo
          sudo dnf install eneru</pre>
            </div>

            <div class="section">
              <h2>Testing / Pre-release</h2>
              <div class="note">
                <strong>Note:</strong> The testing channel contains release candidates (rc), beta, and alpha versions.
