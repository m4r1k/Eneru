name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

# Third-party actions use readable upstream release refs. Dependabot proposes
# updates weekly; review their release notes and let CI test each change.
jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      # actions/checkout needs `contents: read` on private repos;
      # without it the checkout step fails because every other
      # permission defaults to `none` once any one is declared.
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
