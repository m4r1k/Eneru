name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All third-party action invocations are SHA-pinned (with the
# corresponding tag in a comment) so a moved tag in the upstream
# action repo cannot silently change what runs in CI. Refresh
# periodically by re-running
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` (or, for branch-
# tracked actions like pypa/gh-action-pypi-publish@release/v1,
# `gh api repos/<owner>/<repo>/branches/<branch>`) and updating both
# the SHA and the comment in lockstep across every workflow.
#
# nFPM is pinned to a specific release AND its archive is verified
# against the goreleaser-published checksums.txt before extraction.
# Update both NFPM_VERSION and the comment in any future bump; the
# checksum check will fail loudly if the published file's hash changes
# without an explicit version pin update on our side.
env:
  NFPM_VERSION: "2.41.3"

jobs:
  # Build packages once, then test on multiple OSes
  build-packages:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/eneru/version.py)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install nFPM
        run: |
          BASE="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}"
          ARCHIVE="nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          curl -sLO "${BASE}/${ARCHIVE}"
          curl -sL "${BASE}/checksums.txt" -o nfpm_checksums.txt
          # Verify the downloaded archive against the publisher's
          # signed checksum file so an in-flight tamper is caught
          # before extraction and `sudo mv` install.
          grep " ${ARCHIVE}\$" nfpm_checksums.txt | sha256sum -c -
          tar -xzf "${ARCHIVE}" nfpm
          sudo mv nfpm /usr/local/bin/
          rm "${ARCHIVE}" nfpm_checksums.txt
          nfpm --version

      - name: Build .deb package
        run: VERSION=${{ steps.version.outputs.VERSION }} nfpm package --packager deb --target .

      - name: Build .rpm package
        run: VERSION=${{ steps.version.outputs.VERSION }} nfpm package --packager rpm --target .

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: packages
          path: |
            *.deb
            *.rpm
          retention-days: 1

  # Test pip installation across Python versions
  test-pip-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14', '3.15-dev']
    continue-on-error: ${{ matrix.python-version == '3.15-dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install via pip
        run: pip install ".[notifications]"

      - name: Verify installation
        run: eneru version

      - name: Validate example configs
        run: |
          for config in examples/*.yaml; do
            echo "Validating $config..."
            eneru validate --config "$config"
          done

  # Test .deb package installation on Debian/Ubuntu
  test-deb:
    needs: build-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            version: '11'
            name: Debian 11 (Bullseye)
          - distro: debian
            version: '12'
            name: Debian 12 (Bookworm)
          - distro: debian
            version: '13'
            name: Debian 13 (Trixie)
          - distro: ubuntu
            version: '22.04'
            name: Ubuntu 22.04 (Jammy)
          - distro: ubuntu
            version: '24.04'
            name: Ubuntu 24.04 (Noble)
          - distro: ubuntu
            version: '26.04'
            name: Ubuntu 26.04 (Resolute)
    container:
      image: ${{ matrix.distro }}:${{ matrix.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: packages

      - name: Install dependencies and package
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y python3 python3-yaml
          dpkg-deb -f eneru_*.deb Depends | grep -q "python3-paho-mqtt"
          # --force-depends lets us install even though nut-client isn't
          # in the test container; subsequent `apt-get install -f` then
          # resolves any dependencies it can. Real install failures must
          # surface, so the trailing `|| true` mask is gone.
          dpkg --force-depends -i eneru_*.deb
          apt-get install -f -y --no-install-recommends

      - name: Verify installation
        run: |
          # Check the script is installed
          test -f /opt/ups-monitor/eneru.py
          test -f /etc/ups-monitor/config.yaml
          # Run validation
          python3 /opt/ups-monitor/eneru.py version
          python3 -c "import paho.mqtt.client; print('paho-mqtt import OK')"
          python3 /opt/ups-monitor/eneru.py validate --config /etc/ups-monitor/config.yaml

      - name: Validate example configs
        run: |
          for config in examples/*.yaml; do
            echo "Validating $config..."
            python3 /opt/ups-monitor/eneru.py validate --config "$config"
          done

  # Test .rpm package installation on RHEL UBI
  test-rpm:
    needs: build-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '8'
            image: registry.access.redhat.com/ubi8/ubi
            name: RHEL 8 (Ootpa)
            python_pkg: python39 python39-pyyaml
          - version: '9'
            image: registry.access.redhat.com/ubi9/ubi
            name: RHEL 9 (Plow)
            python_pkg: python3 python3-pyyaml
          - version: '10'
            image: registry.access.redhat.com/ubi10/ubi
            name: RHEL 10 (Coughlan)
            python_pkg: python3 python3-pyyaml
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: packages

      - name: Install dependencies and package
        run: |
          dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-${{ matrix.version }}.noarch.rpm
          dnf install -y ${{ matrix.python_pkg }}
          # paho-mqtt is a SOFT dep on RPM (see nfpm.yaml). Install it
          # per-RHEL-version because the distro story is uneven:
          #   * RHEL 9 + EPEL ships python3-paho-mqtt for the system
          #     python3 — works as a normal dnf install.
          #   * RHEL 8's EPEL build is for system python3 (3.6); this
          #     CI matrix uses python3.9 via the `python39` package, so
          #     the dnf-installed paho would land in the wrong site-
          #     packages. Use pip into python3 (== 3.9 here) instead.
          #   * RHEL 10 has no python3-paho-mqtt in BaseOS / AppStream /
          #     CRB / EPEL 10 at all. pip-install it; --break-system-
          #     packages is required by PEP 668 since EL 10 marks the
          #     site-packages as externally managed (acceptable in a
          #     throw-away CI container).
          case "${{ matrix.version }}" in
            9)
              dnf install -y python3-paho-mqtt
              ;;
            8)
              # IMPORTANT: install python39-pip, NOT python3-pip.
              # On ubi8 `python3-pip` targets the SYSTEM python3 (3.6)
              # and installing it drags python3 (3.6) into the image,
              # which then wins the `python3` alternative slot away
              # from python3.9 — and Eneru needs dataclasses (Python
              # 3.7+) so the next `python3 /opt/ups-monitor/eneru.py
              # version` blows up with `ModuleNotFoundError: No module
              # named 'dataclasses'`. python39-pip is the pip package
              # for the 3.9 stack, mirroring python39-pyyaml above.
              dnf install -y python39-pip
              python3 -m pip install --no-deps paho-mqtt
              ;;
            10)
              # ubi10 ships python3 without pip; install it explicitly
              # before the pip-install fallback. python3-pip lives in
              # the AppStream repo on RHEL 10.
              dnf install -y python3-pip
              python3 -m pip install --no-deps --break-system-packages paho-mqtt
              ;;
          esac
          # Lock in the new packaging contract: python3-paho-mqtt MUST
          # NOT be a hard dep on the rpm — otherwise `dnf install` of
          # eneru would fail on RHEL 10 (where the package doesn't
          # exist). It may still appear under `Recommends:`, which dnf
          # resolves opportunistically. `rpm -qpR` lists hard deps only.
          if rpm -qpR eneru-*.rpm | grep -q "^python3-paho-mqtt"; then
            echo "ERROR: python3-paho-mqtt regressed to a hard rpm dep."
            echo "       Move it back to recommends: in nfpm.yaml."
            exit 1
          fi
          # Try rpm first (fast, with --nodeps for the missing nut-
          # client). --nodeps is kept only because nut-client is absent
          # in the minimal UBI test images. If that fails for non-dep
          # reasons, fall back to dnf with --skip-broken. Real install
          # failures still propagate.
          rpm -ivh --nodeps eneru-*.rpm || dnf install -y ./eneru-*.rpm --skip-broken

      - name: Verify installation
        run: |
          # Check the script is installed
          test -f /opt/ups-monitor/eneru.py
          test -f /etc/ups-monitor/config.yaml
          # Run validation
          python3 /opt/ups-monitor/eneru.py version
          python3 -c "import paho.mqtt.client; print('paho-mqtt import OK')"
          python3 /opt/ups-monitor/eneru.py validate --config /etc/ups-monitor/config.yaml

      - name: Validate example configs
        run: |
          for config in examples/*.yaml; do
            echo "Validating $config..."
            python3 /opt/ups-monitor/eneru.py validate --config "$config"
          done

  # Test pip installation inside containers (ensures pyproject.toml works on real distros)
  test-pip-in-container:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            version: '11'
            name: Debian 11
          - distro: debian
            version: '12'
            name: Debian 12
          - distro: debian
            version: '13'
            name: Debian 13
          # Ubuntu 22.04 skipped: system pip 22.0.2 has a regression with
          # pyproject.toml dynamic version metadata, building UNKNOWN-0.0.0.
          # Upgrading pip fixes it, but that no longer tests the real system.
          # Ubuntu 22.04 is covered by the test-deb job instead.
          - distro: ubuntu
            version: '24.04'
            name: Ubuntu 24.04
          - distro: ubuntu
            version: '26.04'
            name: Ubuntu 26.04
          - image: registry.access.redhat.com/ubi10/ubi
            name: RHEL 10 (Coughlan)
    container:
      image: ${{ matrix.image || format('{0}:{1}', matrix.distro, matrix.version) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install pip and dependencies (Debian/Ubuntu)
        if: matrix.distro != ''
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y python3 python3-pip

      - name: Install pip and dependencies (RHEL)
        if: matrix.image != ''
        run: |
          dnf install -y python3 python3-pip

      - name: Install via pip
        run: |
          python3 -m pip install --break-system-packages ".[notifications]" || \
          python3 -m pip install ".[notifications]"

      - name: Verify installation
        run: eneru version

      - name: Validate example configs
        run: |
          for config in examples/*.yaml; do
            echo "Validating $config..."
            eneru validate --config "$config"
          done

  # Build the official OCI image from the checked-out commit. PR CI must
  # not depend on a GHCR tag that may not exist before the first 5.4 release.
  test-oci-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/eneru/version.py)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build OCI image
        run: docker build --build-arg VERSION=${{ steps.version.outputs.VERSION }} -t eneru:ci .

      - name: Verify OCI image
        run: |
          docker run --rm eneru:ci version
          docker run --rm eneru:ci validate --config /etc/ups-monitor/config.yaml
          # Dashboard assets ship in the image and are importable from the
          # eneru.web package. We can't smoke the live HTTP path here (the daemon
          # blocks on the initial NUT connection, and there's no NUT server in
          # this job) — that runs in E2E Test 46 against the real NUT dummy.
          docker run --rm eneru:ci python -c "import importlib.resources as r; assert (r.files('eneru.web')/'index.html').read_text().find('<title>Eneru</title>') >= 0; print('dashboard asset present in image')"

      - name: Verify OCI image with Podman
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          docker tag eneru:ci localhost/eneru:ci
          docker save localhost/eneru:ci -o /tmp/eneru-ci.tar
          sudo podman load -i /tmp/eneru-ci.tar
          sudo podman run --rm localhost/eneru:ci version
