name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  E2E_DIR: tests/e2e

# All third-party action invocations are SHA-pinned (with the
# corresponding tag in a comment) so a moved tag in the upstream
# action repo cannot silently change what runs in CI. Refresh
# periodically by re-running
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` (or, for branch-
# tracked actions like pypa/gh-action-pypi-publish@release/v1,
# `gh api repos/<owner>/<repo>/branches/<branch>`) and updating both
# the SHA and the comment in lockstep across every workflow.
#
# Each E2E group runs as a separate matrix job so they execute in
# parallel. Total wall-clock is bounded by the slowest group instead
# of the previous ~6+ minute single sequential job.
#
# v5.1.2 split the previous `Redundancy and Stats` job into two
# (`Redundancy` runs tests 21-27 + 37/38 + R1/R2, `Stats` runs tests
# 28-32 + 34/35) so the heaviest group no longer gates the matrix on
# its own.
#
# OPERATOR ACTION REQUIRED when this PR's branch protection updates:
# the required checks on `main` are now SIX E2E jobs. Add `E2E Loopback`
# alongside the existing five E2E jobs. The validate matrix (×6) is
# unchanged. Total required checks: 12.
#   - E2E CLI
#   - E2E UPS Single
#   - E2E UPS Multi
#   - E2E Redundancy
#   - E2E Stats
#   - E2E Loopback
jobs:
  e2e:
    name: "E2E ${{ matrix.label }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: cli,        label: "CLI" }
          - { group: single-ups, label: "UPS Single" }
          - { group: multi-ups,  label: "UPS Multi" }
          - { group: redundancy, label: "Redundancy" }
          - { group: stats,      label: "Stats" }
          - { group: loopback,   label: "Loopback" }
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up E2E environment
        uses: ./.github/actions/e2e-setup
        with:
          e2e-dir: ${{ env.E2E_DIR }}

      - name: "Run E2E group: ${{ matrix.label }}"
        env:
          # Test 7 (single-ups.sh) needs this secret to actually verify
          # notification delivery; without it the test SKIPs. The per-
          # step env was dropped when this workflow was split into the
          # matrix groups in commit ade1d16 — restoring it on every
          # matrix entry is harmless (only Test 7 reads it) and avoids
          # making the workflow group-aware.
          E2E_NOTIFICATION_URL: ${{ secrets.E2E_NOTIFICATION_URL }}
          # Bypass the v5.4 "is_local requires root" startup check so
          # eneru runs as the runner user. Sudo-elevating eneru would
          # leave its SQLite DB and state files root-owned, which then
          # breaks subsequent tests that read/write those files as the
          # runner user. The check is documented as a testing/dry-run
          # bypass; production containers never set it.
          ENERU_SKIP_PRIVILEGE_CHECK: "1"
        run: bash tests/e2e/groups/${{ matrix.group }}.sh

      - name: Verify v5.3 E2E coverage is wired
        if: matrix.group == 'single-ups'
        run: |
          # This step is a wiring guard for v5.3's E2E cases. The tests
          # themselves run in the group script above; these greps catch a
          # workflow/script mismatch where the release-critical cases were
          # renamed, moved, or accidentally dropped from the single-UPS job.
          grep -q "Test 39: On-battery stabilization suppresses transient critical readings" tests/e2e/groups/single-ups.sh
          grep -q "Test 40: Remote SSH healthcheck is harmless" tests/e2e/groups/single-ups.sh
          grep -q "Test 41: Manual remote dry-run executes no configured commands" tests/e2e/groups/single-ups.sh
          grep -q "Test 42: Manual confirmed remote shutdown reaches selected target" tests/e2e/groups/single-ups.sh
          grep -q "Test 43: Embedded API health/readiness/metrics" tests/e2e/groups/single-ups.sh
          grep -q "Test 44: Unreachable remote shutdown is bounded" tests/e2e/groups/single-ups.sh
          grep -q "Test 45: MQTT status publishes power-quality metrics" tests/e2e/groups/single-ups.sh
          grep -q "Test 46: OCI image runs with API enabled by CLI flags" tests/e2e/groups/single-ups.sh

      - name: Verify v5.5 loopback E2E coverage is wired
        if: matrix.group == 'loopback'
        run: |
          grep -Eq "^[[:space:]]*run_loopback_case[[:space:]]+root[[:space:]]+root[[:space:]]+false[[:space:]]+19191[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*run_loopback_case[[:space:]]+sudo[[:space:]]+testuser[[:space:]]+true[[:space:]]+19192[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*negative_missing_machine_id[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*negative_missing_loopback[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -q "stop_vms" tests/e2e/groups/loopback.sh
          grep -q "stop_compose" tests/e2e/groups/loopback.sh
          grep -q "stop_containers_rootless" tests/e2e/groups/loopback.sh
          grep -q "unmount_filesystems" tests/e2e/groups/loopback.sh

      - name: Verify v6.0 E2E coverage is wired
        if: matrix.group == 'cli' || matrix.group == 'single-ups'
        run: |
          # v6.0 wiring guard: auth CLI lifecycle (cli) and API auth login /
          # tiered config / write gating (single-ups) must stay present.
          if [ "${{ matrix.group }}" = "cli" ]; then
            grep -q "Test 51: auth user + apikey CLI lifecycle" tests/e2e/groups/cli.sh
          else
            grep -q "Test 52: API authentication login + tiered config + write gating" tests/e2e/groups/single-ups.sh
            grep -q "Test 53: UPS control fail-closed + allowlist enforcement" tests/e2e/groups/single-ups.sh
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          cd ${{ env.E2E_DIR }}
          docker compose logs

          echo ""
          echo "=== Eneru Test Logs ==="
          cat /tmp/test*.log 2>/dev/null || echo "No test logs found"

      - name: Cleanup
        if: always()
        run: |
          cd ${{ env.E2E_DIR }}
          docker compose down -v --remove-orphans
          sudo umount /tmp/eneru-e2e-tmpfs 2>/dev/null || true
