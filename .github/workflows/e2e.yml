name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  E2E_DIR: tests/e2e

# All third-party action invocations are SHA-pinned (with the
# corresponding tag in a comment) so a moved tag in the upstream
# action repo cannot silently change what runs in CI. Refresh
# periodically by re-running
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` (or, for branch-
# tracked actions like pypa/gh-action-pypi-publish@release/v1,
# `gh api repos/<owner>/<repo>/branches/<branch>`) and updating both
# the SHA and the comment in lockstep across every workflow.
#
# Each E2E group runs as a separate matrix job so they execute in
# parallel. Total wall-clock is bounded by the slowest group instead
# of the previous ~6+ minute single sequential job.
#
# v5.1.2 split the previous `Redundancy and Stats` job into two so the
# heaviest group no longer gated the matrix on its own. v6.1 split the
# two remaining long poles: `UPS Single` -> `UPS Single Core` +
# `UPS Single Auth`, and `Redundancy` -> `Redundancy Quorum` +
# `Redundancy Regression`, bringing the matrix to EIGHT parallel E2E
# jobs. (Image builds are also cached across groups now via buildx +
# the GitHub Actions cache; see .github/actions/e2e-setup.)
#
# OPERATOR ACTION REQUIRED before merge: branch protection on `main`
# still lists the old check names, so PRs wedge on "expected, never
# reported" until it is updated. Remove required checks `E2E UPS Single`
# and `E2E Redundancy`; add the four new jobs. The eight required E2E
# checks are then:
#   - E2E CLI
#   - E2E UPS Single Core
#   - E2E UPS Single Auth
#   - E2E UPS Multi
#   - E2E Redundancy Quorum
#   - E2E Redundancy Regression
#   - E2E Stats
#   - E2E Loopback
# (The validate side also changes in v6.1 — reduced PR matrix; make only
# the 3.9 + 3.12 validate checks required. See validate.yml.)
jobs:
  e2e:
    name: "E2E ${{ matrix.label }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: cli,                   label: "CLI" }
          - { group: single-ups-core,       label: "UPS Single Core" }
          - { group: single-ups-auth,       label: "UPS Single Auth" }
          - { group: multi-ups,             label: "UPS Multi" }
          - { group: redundancy-quorum,     label: "Redundancy Quorum" }
          - { group: redundancy-regression, label: "Redundancy Regression" }
          - { group: stats,                 label: "Stats" }
          - { group: loopback,              label: "Loopback" }
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up E2E environment
        uses: ./.github/actions/e2e-setup
        with:
          e2e-dir: ${{ env.E2E_DIR }}

      - name: "Run E2E group: ${{ matrix.label }}"
        env:
          # Test 7 (single-ups-core.sh) needs this secret to actually verify
          # notification delivery; without it the test SKIPs. The per-
          # step env was dropped when this workflow was split into the
          # matrix groups in commit ade1d16 — restoring it on every
          # matrix entry is harmless (only Test 7 reads it) and avoids
          # making the workflow group-aware.
          E2E_NOTIFICATION_URL: ${{ secrets.E2E_NOTIFICATION_URL }}
          # Bypass the v5.4 "is_local requires root" startup check so
          # eneru runs as the runner user. Sudo-elevating eneru would
          # leave its SQLite DB and state files root-owned, which then
          # breaks subsequent tests that read/write those files as the
          # runner user. The check is documented as a testing/dry-run
          # bypass; production containers never set it.
          ENERU_SKIP_PRIVILEGE_CHECK: "1"
        run: bash tests/e2e/groups/${{ matrix.group }}.sh

      - name: Verify v5.3 E2E coverage is wired
        if: matrix.group == 'single-ups-core'
        run: |
          # This step is a wiring guard for v5.3's E2E cases. The tests
          # themselves run in the group script above; these greps catch a
          # workflow/script mismatch where the release-critical cases were
          # renamed, moved, or accidentally dropped from the single-UPS
          # core job (split from single-ups in v6.1).
          grep -q "Test 39: On-battery stabilization suppresses transient critical readings" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 40: Remote SSH healthcheck is harmless" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 41: Manual remote dry-run executes no configured commands" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 42: Manual confirmed remote shutdown reaches selected target" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 43: Embedded API health/readiness/metrics" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 44: Unreachable remote shutdown is bounded" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 45: MQTT status publishes power-quality metrics" tests/e2e/groups/single-ups-core.sh
          grep -q "Test 46: OCI image runs with API enabled by CLI flags" tests/e2e/groups/single-ups-core.sh

      - name: Verify v5.5 loopback E2E coverage is wired
        if: matrix.group == 'loopback'
        run: |
          grep -Eq "^[[:space:]]*run_loopback_case[[:space:]]+root[[:space:]]+root[[:space:]]+false[[:space:]]+19191[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*run_loopback_case[[:space:]]+sudo[[:space:]]+testuser[[:space:]]+true[[:space:]]+19192[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*negative_missing_machine_id[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*negative_missing_loopback[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -Eq "^[[:space:]]*accept_new_known_hosts_remote[[:space:]]+19194[[:space:]]*$" tests/e2e/groups/loopback.sh
          grep -q "stop_vms" tests/e2e/groups/loopback.sh
          grep -q "stop_compose" tests/e2e/groups/loopback.sh
          grep -q "stop_containers_rootless" tests/e2e/groups/loopback.sh
          grep -q "unmount_filesystems" tests/e2e/groups/loopback.sh

      - name: Verify v6.0 E2E coverage is wired
        if: matrix.group == 'cli' || matrix.group == 'single-ups-auth'
        run: |
          # v6.0 wiring guard: auth CLI lifecycle (cli) and API auth login /
          # tiered config / write gating (single-ups-auth) must stay present.
          if [ "${{ matrix.group }}" = "cli" ]; then
            grep -q "Test 51: auth user + apikey CLI lifecycle" tests/e2e/groups/cli.sh
            grep -q "Test 58: NUT name autodiscovery self-heals single exposed UPS" tests/e2e/groups/cli.sh
          else
            grep -q "Test 52: API authentication login + tiered config + write gating" tests/e2e/groups/single-ups-auth.sh
            grep -q "Test 53: UPS control fail-closed + allowlist enforcement" tests/e2e/groups/single-ups-auth.sh
            grep -q "Test 54: Config hot-reload via SIGHUP and API" tests/e2e/groups/single-ups-auth.sh
            grep -q "Test 55: Browser dashboard served by embedded API" tests/e2e/groups/single-ups-auth.sh
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          cd ${{ env.E2E_DIR }}
          docker compose logs

          echo ""
          echo "=== Eneru Test Logs ==="
          cat /tmp/test*.log 2>/dev/null || echo "No test logs found"

      - name: Cleanup
        if: always()
        run: |
          cd ${{ env.E2E_DIR }}
          docker compose down -v --remove-orphans
          sudo umount /tmp/eneru-e2e-tmpfs 2>/dev/null || true
