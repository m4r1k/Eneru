name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  E2E_DIR: tests/e2e

# Each E2E group runs as a separate matrix job so they execute in
# parallel. Total wall-clock is bounded by the slowest group
# (`Redundancy and Stats`, ~5 minutes including setup) instead of the
# previous ~6+ minute single sequential job.
#
# OPERATOR ACTION REQUIRED on first merge: branch protection on `main`
# previously required `e2e-test` (single check). Replace it with the
# four new checks shown in the GitHub UI:
#   - E2E CLI
#   - E2E UPS Single
#   - E2E UPS Multi
#   - E2E Redundancy and Stats
jobs:
  e2e:
    name: "E2E ${{ matrix.label }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: cli,                  label: "CLI" }
          - { group: single-ups,           label: "UPS Single" }
          - { group: multi-ups,            label: "UPS Multi" }
          - { group: redundancy-and-stats, label: "Redundancy and Stats" }
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up E2E environment
        uses: ./.github/actions/e2e-setup
        with:
          e2e-dir: ${{ env.E2E_DIR }}

      - name: "Run E2E group: ${{ matrix.label }}"
        run: bash tests/e2e/groups/${{ matrix.group }}.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          cd ${{ env.E2E_DIR }}
          docker compose logs

          echo ""
          echo "=== Eneru Test Logs ==="
          cat /tmp/test*.log 2>/dev/null || echo "No test logs found"

      - name: Cleanup
        if: always()
        run: |
          cd ${{ env.E2E_DIR }}
          docker compose down -v --remove-orphans
          sudo umount /tmp/eneru-e2e-tmpfs 2>/dev/null || true
