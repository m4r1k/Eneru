version: 2
updates:
  # Keep GitHub Actions up to date.
  # ISS-041: the default "/" directory only scans .github/workflows; composite
  # actions under .github/actions/ were invisible to Dependabot, so their
  # versions drifted (e2e-setup diverged from the workflows' setup-python ref).
  # List both so composite-action release refs get update PRs too.
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/e2e-setup"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  # ISS-044: Python deps are all `>=` floors with no upper bounds, and nothing
  # consumes uv.lock in CI, so a breaking major would land ungated. Dependabot
  # on the pip ecosystem is the early-warning layer: floor bumps + security
  # advisories arrive as PRs that the validate matrix gates before merge.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
