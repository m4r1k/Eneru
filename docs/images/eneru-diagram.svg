<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 550">
  <title>Eneru Architecture Diagram</title>
  <defs>
    <marker id="arrow" viewBox="0 0 8 6" refX="0" refY="3" markerWidth="8" markerHeight="6" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C8977A"/>
    </marker>
  </defs>

  <!-- ZONES -->
  <g id="zones">
    <!-- Source Zone -->
    <rect x="20" y="30" width="200" height="340" rx="12" ry="12" fill="#E07A5F" fill-opacity="0.07" stroke="#E07A5F" stroke-opacity="0.15" stroke-width="1"/>
    <text x="120" y="56" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#A09080" letter-spacing="2">SOURCE</text>

    <!-- Monitor Zone -->
    <rect x="260" y="30" width="240" height="340" rx="12" ry="12" fill="#E07A5F" fill-opacity="0.07" stroke="#E07A5F" stroke-opacity="0.15" stroke-width="1"/>
    <text x="380" y="56" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#A09080" letter-spacing="2">MONITOR</text>

    <!-- Targets Zone -->
    <rect x="540" y="30" width="240" height="340" rx="12" ry="12" fill="#E07A5F" fill-opacity="0.07" stroke="#E07A5F" stroke-opacity="0.15" stroke-width="1"/>
    <text x="660" y="56" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#A09080" letter-spacing="2">SHUTDOWN TARGETS</text>

    <!-- Consumers Zone (bottom strip). Label sits below the boxes so
         the four downward arrows from OBSERVABILITY can land on the
         box tops without crossing it. -->
    <rect x="20" y="410" width="760" height="120" rx="12" ry="12" fill="#E07A5F" fill-opacity="0.07" stroke="#E07A5F" stroke-opacity="0.15" stroke-width="1"/>
    <text x="400" y="522" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#A09080" letter-spacing="2">OBSERVABILITY CONSUMERS</text>
  </g>

  <!-- CONNECTORS -->
  <g id="connectors" fill="none" stroke="#C8977A" stroke-width="1.8">
    <!-- UPS A -> NUT (elbow) -->
    <polyline points="116,144 124,144 124,170 130,170" marker-end="url(#arrow)"/>
    <!-- UPS B -> NUT (elbow) -->
    <polyline points="116,224 124,224 124,194 130,194" marker-end="url(#arrow)"/>

    <!-- NUT -> Eneru (elbow) -->
    <polyline points="214,182 244,182 244,134 282,134" marker-end="url(#arrow)"/>

    <!-- Eneru -> Observability sub-box (vertical) -->
    <line x1="380" y1="166" x2="380" y2="194" marker-end="url(#arrow)"/>

    <!-- Eneru -> Targets fan-out -->
    <!-- Horizontal trunk from Eneru (no arrowhead) -->
    <line x1="478" y1="134" x2="520" y2="134"/>
    <!-- Vertical backbone (no arrowhead). Spans the new target stack
         (y=115..315) so each branch attaches cleanly. -->
    <line x1="520" y1="115" x2="520" y2="315"/>
    <!-- Junction dot -->
    <circle cx="520" cy="134" r="3" fill="#C8977A" stroke="none"/>

    <!-- Branches: arrowheads land 8px before box (boxes start at x=560).
         Branch y values track the new target box centers (y_box + 20). -->
    <line x1="520" y1="115" x2="552" y2="115" marker-end="url(#arrow)"/>
    <line x1="520" y1="165" x2="552" y2="165" marker-end="url(#arrow)"/>
    <line x1="520" y1="215" x2="552" y2="215" marker-end="url(#arrow)"/>
    <line x1="520" y1="265" x2="552" y2="265" marker-end="url(#arrow)"/>
    <line x1="520" y1="315" x2="552" y2="315" marker-end="url(#arrow)"/>

    <!-- Observability outputs -> Consumer strip -->
    <!-- Vertical drop from observability sub-box bottom -->
    <line x1="380" y1="332" x2="380" y2="392"/>
    <!-- Junction dot at horizontal trunk -->
    <circle cx="380" cy="392" r="3" fill="#C8977A" stroke="none"/>
    <!-- Horizontal trunk above the consumers strip -->
    <line x1="124" y1="392" x2="676" y2="392"/>
    <!-- Drops to each consumer box (boxes top at y=448) -->
    <line x1="124" y1="392" x2="124" y2="440" marker-end="url(#arrow)"/>
    <line x1="308" y1="392" x2="308" y2="440" marker-end="url(#arrow)"/>
    <line x1="492" y1="392" x2="492" y2="440" marker-end="url(#arrow)"/>
    <line x1="676" y1="392" x2="676" y2="440" marker-end="url(#arrow)"/>
  </g>

  <!-- COMPONENTS -->
  <g id="components">
    <!-- UPS A -->
    <rect x="44" y="122" width="72" height="44" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <path d="M58,134 L53,144 L57,144 L52,154" fill="none" stroke="#3D3632" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="149" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">UPS A</text>

    <!-- UPS B -->
    <rect x="44" y="202" width="72" height="44" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <path d="M58,214 L53,224 L57,224 L52,234" fill="none" stroke="#3D3632" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="229" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">UPS B</text>

    <!-- "+ more" hint between UPSes (italic, muted) -->
    <text x="86" y="186" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-style="italic" fill="#A09080">+ more</text>

    <!-- NUT Server -->
    <rect x="130" y="157" width="84" height="50" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <!-- Server rack icon -->
    <path d="M145,170 L145,195 M145,170 L155,170 L155,195 L145,195 M145,177 L155,177 M145,184 L155,184 M145,191 L155,191" fill="none" stroke="#3D3632" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="186" y="180" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#3D3632">NUT</text>
    <text x="186" y="194" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="400" fill="#8A7A6A">Server</text>

    <!-- Eneru focal box -->
    <rect x="290" y="100" width="180" height="66" rx="8" ry="8" fill="#E07A5F"/>
    <path d="M320,118 L312,134 L320,134 L312,152" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="392" y="139" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Eneru</text>

    <!-- Observability sub-box (in MONITOR zone) -->
    <rect x="290" y="194" width="180" height="138" rx="8" ry="8" fill="#F5DDD5" stroke="#D4BBA8" stroke-width="1.2"/>
    <text x="380" y="212" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#A09080" letter-spacing="1.5">OBSERVABILITY</text>

    <!-- Output pills (single column, four rows) -->
    <rect x="306" y="222" width="148" height="22" rx="11" ry="11" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1"/>
    <text x="380" y="237" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#3D3632">REST API</text>

    <rect x="306" y="248" width="148" height="22" rx="11" ry="11" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1"/>
    <text x="380" y="263" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#3D3632">MQTT</text>

    <rect x="306" y="274" width="148" height="22" rx="11" ry="11" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1"/>
    <text x="380" y="289" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#3D3632">Prometheus /metrics</text>

    <rect x="306" y="300" width="148" height="22" rx="11" ry="11" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1"/>
    <text x="380" y="315" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#3D3632">JSON / syslog logs</text>

    <!-- GROUP wrapper: a clearly visible dashed border that frames the
         5 shutdown targets that belong to one UPS or redundancy group.
         The "+ more groups" hint signals multi-group support without
         needing extra ghost columns that get lost against the zone tint. -->
    <rect x="552" y="72" width="216" height="276" rx="10" ry="10" fill="none" stroke="#C8977A" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="562" y="86" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#3D3632" letter-spacing="1.5">GROUP A</text>
    <text x="758" y="86" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-style="italic" fill="#A09080">+ more groups</text>

    <!-- Targets: Virtual Machines -->
    <rect x="560" y="95" width="200" height="40" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <path d="M578,109 L586,105 L594,109 L586,113 Z M578,113 L586,117 L594,113 M578,117 L586,121 L594,117" fill="none" stroke="#3D3632" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="660" y="120" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Virtual Machines</text>

    <!-- Targets: Containers -->
    <rect x="560" y="145" width="200" height="40" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <path d="M578,159 L586,155 L594,159 L594,167 L586,171 L578,167 Z M586,155 L586,165 M578,159 L586,165 L594,159" fill="none" stroke="#3D3632" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="660" y="170" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Containers</text>

    <!-- Targets: Remote Servers (unchanged y=195) -->
    <rect x="560" y="195" width="200" height="40" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <circle cx="586" cy="215" r="7" fill="none" stroke="#3D3632" stroke-width="1.3"/>
    <path d="M579,215 L593,215 M586,208 Q583,212 583,215 Q583,218 586,222 M586,208 Q589,212 589,215 Q589,218 586,222" fill="none" stroke="#3D3632" stroke-width="1.1" stroke-linecap="round"/>
    <text x="660" y="220" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Remote Servers</text>

    <!-- Targets: NAS Systems -->
    <rect x="560" y="245" width="200" height="40" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <path d="M578,258 L594,258 L594,272 L578,272 Z M578,265 L594,265 M590,269 L592,269" fill="none" stroke="#3D3632" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="660" y="270" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">NAS Systems</text>

    <!-- Targets: Local System -->
    <rect x="560" y="295" width="200" height="40" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <path d="M578,306 L594,306 L594,318 L578,318 Z M583,322 L589,322 M586,318 L586,322" fill="none" stroke="#3D3632" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="660" y="320" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Local System</text>

    <!-- Consumers (bottom strip): TUI, Grafana, Home Assistant, Notifications.
         Icon stacked above text so the long labels (Home Assistant,
         Notifications) center cleanly without colliding with the icon. -->

    <!-- Consumer 1: TUI -->
    <rect x="44" y="448" width="160" height="58" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <!-- Terminal icon "> _" centered above text -->
    <path d="M118,460 L122,464 L118,468 M125,469 L131,469" fill="none" stroke="#3D3632" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="124" y="485" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">TUI</text>
    <text x="124" y="499" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400" fill="#8A7A6A">live state</text>

    <!-- Consumer 2: Grafana -->
    <rect x="228" y="448" width="160" height="58" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <!-- Bar chart icon -->
    <path d="M300,470 L300,465 M304,470 L304,461 M308,470 L308,463 M312,470 L312,458 M298,470 L314,470" fill="none" stroke="#3D3632" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="308" y="485" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Grafana</text>
    <text x="308" y="499" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400" fill="#8A7A6A">scrapes /metrics</text>

    <!-- Consumer 3: Home Assistant -->
    <rect x="412" y="448" width="160" height="58" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <!-- House icon -->
    <path d="M486,470 L486,462 L492,457 L498,462 L498,470 Z M491,470 L491,465 L495,465 L495,470" fill="none" stroke="#3D3632" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="492" y="485" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Home Assistant</text>
    <text x="492" y="499" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400" fill="#8A7A6A">subscribes MQTT</text>

    <!-- Consumer 4: Notifications -->
    <rect x="596" y="448" width="160" height="58" rx="6" ry="6" fill="#FFFAF6" stroke="#D4BBA8" stroke-width="1.2"/>
    <!-- Bell icon -->
    <path d="M671,468 Q671,462 676,462 Q681,462 681,468 L682,471 L670,471 Z M674,473 Q676,475 678,473" fill="none" stroke="#3D3632" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="676" y="485" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#3D3632">Notifications</text>
    <text x="676" y="499" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400" fill="#8A7A6A">Apprise services</text>
  </g>
</svg>
