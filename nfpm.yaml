# nFPM configuration for building .deb and .rpm packages
# https://nfpm.goreleaser.com/configuration/

name: eneru
arch: all
platform: linux
version: "${VERSION}"
section: admin
priority: optional
maintainer: Eneru Maintainers <noreply@github.com>
description: |
  Intelligent UPS Monitoring & Shutdown Orchestration for NUT.
  Monitors UPS status via Network UPS Tools (NUT) and executes configurable
  shutdown sequences to protect your entire infrastructure during power events.
vendor: Eneru
homepage: https://github.com/m4r1k/Eneru
license: MIT

# Default dependencies (used as the fallback when no packager-specific
# `overrides` block matches). Both packagers we ship (deb, rpm) define
# their own `overrides` below — this list is dead in practice, so we keep
# only the cross-distro essentials and avoid implying paho-mqtt is a hard
# dep on every target. See the per-packager overrides for the real lists.
depends:
  - python3
  - nut-client

# Recommended packages (not required but useful)
recommends:
  - openssh-client

# Suggested packages
suggests:
  - apprise

# Override package-specific dependencies
overrides:
  deb:
    depends:
      - python3
      - python3-yaml
      - python3-paho-mqtt
      - python3-bcrypt
      - nut-client
    recommends:
      - apprise
      - openssh-client
  rpm:
    depends:
      - python3
      - python3-pyyaml
      - nut-client
    # python3-paho-mqtt is a SOFT dep on RPM. RHEL 10 doesn't ship it
    # at all (not in BaseOS / AppStream / CRB / EPEL 10); RHEL 8 ships
    # an EPEL build only for the system python3 (3.6), which doesn't
    # match the python3.9+ interpreter we install. Making it a hard
    # `depends:` would break installation on RHEL 8 and 10. The MQTT
    # publisher gracefully degrades when paho is missing (see
    # src/eneru/mqtt.py), so RPM users who want MQTT install it via
    # `pip install paho-mqtt` (use a venv or `--break-system-packages`
    # on EL10 per PEP 668). RHEL 9 with EPEL still resolves the
    # `recommends:` automatically.
    # python3-bcrypt is a SOFT dep on RPM for the same EL10 reason as
    # python3-paho-mqtt above: it may not resolve on every EL target.
    # API auth is opt-in and src/eneru/auth.py lazy-imports bcrypt with an
    # actionable install hint, so a missing package degrades cleanly rather
    # than blocking the install. EL users who enable auth install it via
    # `dnf install python3-bcrypt` (EPEL) or `pip install 'eneru[auth]'`.
    recommends:
      - apprise
      - openssh-clients
      - python3-paho-mqtt
      - python3-bcrypt

# Files to include in the package
contents:
  # Wrapper script (entry point)
  - src: packaging/eneru-wrapper.py
    dst: /opt/ups-monitor/eneru.py
    file_info:
      mode: 0755
      owner: root
      group: root

  # Symlink for PATH access
  - dst: /usr/local/bin/eneru
    type: symlink
    src: /opt/ups-monitor/eneru.py

  # Eneru package modules
  - src: src/eneru/__init__.py
    dst: /opt/ups-monitor/eneru/__init__.py
    file_info:
      mode: 0644
      owner: root
      group: root

