# nFPM configuration for building .deb and .rpm packages
# https://nfpm.goreleaser.com/configuration/

name: eneru
arch: all
platform: linux
version: "${VERSION}"
section: admin
priority: optional
maintainer: Eneru Maintainers <noreply@github.com>
description: |
  Intelligent UPS Monitoring & Shutdown Orchestration for NUT.
  Monitors UPS status via Network UPS Tools (NUT) and executes configurable
  shutdown sequences to protect your entire infrastructure during power events.
vendor: Eneru
homepage: https://github.com/m4r1k/Eneru
license: MIT

# Dependencies
depends:
  - python3
  - nut-client

# Recommended packages (not required but useful)
recommends:
  - openssh-client

# Suggested packages
suggests:
  - apprise

# Override package-specific dependencies
overrides:
  deb:
    depends:
      - python3
      - python3-yaml
      - nut-client
    recommends:
      - apprise
      - openssh-client
  rpm:
    depends:
      - python3
      - python3-pyyaml
      - nut-client
    recommends:
      - apprise
      - openssh-clients

# Files to include in the package
contents:
  # Wrapper script (entry point)
  - src: packaging/eneru-wrapper.py
    dst: /opt/ups-monitor/eneru.py
    file_info:
      mode: 0755
      owner: root
      group: root

  # Symlink for PATH access
  - dst: /usr/local/bin/eneru
    type: symlink
    src: /opt/ups-monitor/eneru.py

  # Eneru package modules
  - src: src/eneru/__init__.py
    dst: /opt/ups-monitor/eneru/__init__.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/__main__.py
    dst: /opt/ups-monitor/eneru/__main__.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/version.py
    dst: /opt/ups-monitor/eneru/version.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/config.py
    dst: /opt/ups-monitor/eneru/config.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/state.py
    dst: /opt/ups-monitor/eneru/state.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/logger.py
    dst: /opt/ups-monitor/eneru/logger.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/notifications.py
    dst: /opt/ups-monitor/eneru/notifications.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/utils.py
    dst: /opt/ups-monitor/eneru/utils.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/actions.py
    dst: /opt/ups-monitor/eneru/actions.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/monitor.py
    dst: /opt/ups-monitor/eneru/monitor.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/multi_ups.py
    dst: /opt/ups-monitor/eneru/multi_ups.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/health_model.py
    dst: /opt/ups-monitor/eneru/health_model.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/redundancy.py
    dst: /opt/ups-monitor/eneru/redundancy.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/stats.py
    dst: /opt/ups-monitor/eneru/stats.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/graph.py
    dst: /opt/ups-monitor/eneru/graph.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/lifecycle.py
    dst: /opt/ups-monitor/eneru/lifecycle.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/deferred_delivery.py
    dst: /opt/ups-monitor/eneru/deferred_delivery.py
    file_info:
      mode: 0644
      owner: root
      group: root

  # eneru.shutdown subpackage (mixin per shutdown phase)
  - src: src/eneru/shutdown/__init__.py
    dst: /opt/ups-monitor/eneru/shutdown/__init__.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/shutdown/vms.py
    dst: /opt/ups-monitor/eneru/shutdown/vms.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/shutdown/containers.py
    dst: /opt/ups-monitor/eneru/shutdown/containers.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/shutdown/filesystems.py
    dst: /opt/ups-monitor/eneru/shutdown/filesystems.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/shutdown/remote.py
    dst: /opt/ups-monitor/eneru/shutdown/remote.py
    file_info:
      mode: 0644
      owner: root
      group: root

  # eneru.health subpackage (mixin per health-monitoring concern)
  - src: src/eneru/health/__init__.py
    dst: /opt/ups-monitor/eneru/health/__init__.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/health/voltage.py
    dst: /opt/ups-monitor/eneru/health/voltage.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/health/battery.py
    dst: /opt/ups-monitor/eneru/health/battery.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/cli.py
    dst: /opt/ups-monitor/eneru/cli.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/tui.py
    dst: /opt/ups-monitor/eneru/tui.py
    file_info:
      mode: 0644
      owner: root
      group: root

  # Systemd service file (use /lib for packages, not /etc)
  - src: packaging/eneru.service
    dst: /lib/systemd/system/eneru.service
    file_info:
      mode: 0644
      owner: root
      group: root

  # Shell completion scripts. Single source is the eneru.completion
  # subpackage; nfpm copies each file to two destinations:
  #   1. /opt/ups-monitor/eneru/completion/  -- so `eneru completion
  #      <shell>` can read it via importlib.resources at runtime.
  #   2. /usr/share/<framework>/...          -- canonical FHS path so
  #      bash-completion / zsh / fish auto-load it when the user has
  #      that completion framework installed. We do NOT add
  #      bash-completion as a runtime dep -- users without it can still
  #      get tab completion via `source <(eneru completion bash)`.

  # eneru.completion subpackage (importlib.resources reads from here).
  - src: src/eneru/completion/__init__.py
    dst: /opt/ups-monitor/eneru/completion/__init__.py
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/completion/eneru.bash
    dst: /opt/ups-monitor/eneru/completion/eneru.bash
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/completion/eneru.zsh
    dst: /opt/ups-monitor/eneru/completion/eneru.zsh
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/completion/eneru.fish
    dst: /opt/ups-monitor/eneru/completion/eneru.fish
    file_info:
      mode: 0644
      owner: root
      group: root

  # FHS drops for shell auto-discovery (same files, second destination).
  - src: src/eneru/completion/eneru.bash
    dst: /usr/share/bash-completion/completions/eneru
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/completion/eneru.zsh
    dst: /usr/share/zsh/site-functions/_eneru
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: src/eneru/completion/eneru.fish
    dst: /usr/share/fish/vendor_completions.d/eneru.fish
    file_info:
      mode: 0644
      owner: root
      group: root

  # Default configuration file (marked as config file - won't be overwritten)
  - src: examples/config-reference.yaml
    dst: /etc/ups-monitor/config.yaml
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: root

  # Create the /opt/ups-monitor directory
  - dst: /opt/ups-monitor
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create the /opt/ups-monitor/eneru package directory
  - dst: /opt/ups-monitor/eneru
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create the /opt/ups-monitor/eneru/shutdown subpackage directory
  - dst: /opt/ups-monitor/eneru/shutdown
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create the /opt/ups-monitor/eneru/health subpackage directory
  - dst: /opt/ups-monitor/eneru/health
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create the /opt/ups-monitor/eneru/completion subpackage directory
  - dst: /opt/ups-monitor/eneru/completion
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create the /etc/ups-monitor directory
  - dst: /etc/ups-monitor
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create the /var/lib/eneru directory for the per-UPS SQLite stats stores
  - dst: /var/lib/eneru
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

# Scripts executed during package lifecycle
scripts:
  preinstall: packaging/scripts/preinstall.sh
  postinstall: packaging/scripts/postinstall.sh
  preremove: packaging/scripts/preremove.sh
  postremove: packaging/scripts/postremove.sh
