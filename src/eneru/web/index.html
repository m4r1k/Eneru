<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eneru</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>⚡  Eneru</h1>
    <div id="authbox" class="authbox">
      <label class="theme-pick">Theme
        <select id="theme-select" aria-label="Color theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <span id="who" class="who" hidden></span>
      <button id="loginBtn" type="button">Sign in</button>
      <button id="logoutBtn" type="button" hidden>Sign out</button>
    </div>
  </header>

  <!-- Tab bar (Nutify-style). Real ARIA tabs: arrow-key nav + hash sync wired
       in app.js. The Control tab is hidden until authenticated + nut_control. -->
  <nav id="tabs" class="tabs" role="tablist" aria-label="Dashboard sections">
    <button class="tab" role="tab" id="tab-overview" data-tab="overview"
            aria-controls="panel-overview" aria-selected="true"><span class="tab-emoji" aria-hidden="true">🏠</span>Overview</button>
    <button class="tab" role="tab" id="tab-power" data-tab="power"
            aria-controls="panel-power" aria-selected="false" tabindex="-1"><span class="tab-emoji" aria-hidden="true">⚡</span>Power</button>
    <button class="tab" role="tab" id="tab-battery" data-tab="battery"
            aria-controls="panel-battery" aria-selected="false" tabindex="-1"><span class="tab-emoji" aria-hidden="true">🔋</span>Battery</button>
    <button class="tab" role="tab" id="tab-energy" data-tab="energy"
            aria-controls="panel-energy" aria-selected="false" tabindex="-1"><span class="tab-emoji" aria-hidden="true">📈</span>Energy</button>
    <button class="tab" role="tab" id="tab-events" data-tab="events"
            aria-controls="panel-events" aria-selected="false" tabindex="-1"><span class="tab-emoji" aria-hidden="true">🔔</span>Events</button>
    <button class="tab" role="tab" id="tab-control" data-tab="control"
            aria-controls="panel-control" aria-selected="false" tabindex="-1" hidden><span class="tab-emoji" aria-hidden="true">🎛️</span>Control</button>
    <button class="tab" role="tab" id="tab-config" data-tab="config"
            aria-controls="panel-config" aria-selected="false" tabindex="-1"><span class="tab-emoji" aria-hidden="true">⚙️</span>Config</button>
  </nav>

  <div id="banner" class="banner" role="status" hidden></div>
  <div id="error" class="error" hidden></div>

  <main>
    <!-- Overview ------------------------------------------------------------ -->
    <section id="panel-overview" class="panel" role="tabpanel"
             aria-labelledby="tab-overview" tabindex="0">
      <div id="ups-section">
        <h2>UPS status</h2>
        <div id="ups-cards" class="cards"></div>
      </div>
      <div id="groups-section" hidden>
        <h2>Redundancy groups</h2>
        <div id="group-cards" class="cards"></div>
      </div>
    </section>

    <!-- Power --------------------------------------------------------------- -->
    <section id="panel-power" class="panel" role="tabpanel"
             aria-labelledby="tab-power" tabindex="0" hidden>
      <h2>Power quality</h2>
      <div class="graph-controls">
        <label>UPS <select id="power-ups"></select></label>
        <label>Metric
          <select id="power-metric">
            <option value="voltage">Input voltage (V)</option>
            <option value="output_voltage">Output voltage (V)</option>
            <option value="frequency">Input frequency (Hz)</option>
          </select>
        </label>
        <label>Range
          <select id="power-range">
            <option value="3600">Last hour</option>
            <option value="21600">Last 6 hours</option>
            <option value="86400" selected>Last 24 hours</option>
            <option value="604800">Last 7 days</option>
            <option value="2592000">Last 30 days</option>
          </select>
        </label>
      </div>
      <div id="power-graph" class="graph"></div>
      <p class="chart-note" id="power-note" hidden></p>
    </section>

    <!-- Battery ------------------------------------------------------------- -->
    <section id="panel-battery" class="panel" role="tabpanel"
             aria-labelledby="tab-battery" tabindex="0" hidden>
      <h2>Battery health</h2>
      <div id="battery-health" class="cards"></div>
      <h2>History</h2>
      <div class="graph-controls">
        <label>UPS <select id="battery-ups"></select></label>
        <label>Metric
          <select id="battery-metric">
            <option value="charge">Battery charge (%)</option>
            <option value="runtime">Runtime</option>
            <option value="load">Load (%)</option>
          </select>
        </label>
        <label>Range
          <select id="battery-range">
            <option value="3600">Last hour</option>
            <option value="21600">Last 6 hours</option>
            <option value="86400" selected>Last 24 hours</option>
            <option value="604800">Last 7 days</option>
            <option value="2592000">Last 30 days</option>
          </select>
        </label>
      </div>
      <div id="battery-graph" class="graph"></div>
    </section>

    <!-- Energy -------------------------------------------------------------- -->
    <section id="panel-energy" class="panel" role="tabpanel"
             aria-labelledby="tab-energy" tabindex="0" hidden>
      <h2>Energy</h2>
      <div id="energy-cards" class="cards"></div>
      <h2>Load &amp; power</h2>
      <div class="graph-controls">
        <label>UPS <select id="energy-ups"></select></label>
        <label>Range
          <select id="energy-range">
            <option value="3600">Last hour</option>
            <option value="21600">Last 6 hours</option>
            <option value="86400" selected>Last 24 hours</option>
            <option value="604800">Last 7 days</option>
            <option value="2592000">Last 30 days</option>
          </select>
        </label>
      </div>
      <div id="energy-graph" class="graph"></div>
    </section>

    <!-- Events -------------------------------------------------------------- -->
    <section id="panel-events" class="panel" role="tabpanel"
             aria-labelledby="tab-events" tabindex="0" hidden>
      <h2>Events</h2>
      <div class="event-filters">
        <label>Source
          <select id="event-source-filter">
            <option value="">All sources</option>
          </select>
        </label>
        <div class="filter-field">
          <span id="event-type-label">Type</span>
          <details class="event-type-picker">
            <summary id="event-type-summary">All types</summary>
            <div id="event-type-filter" class="event-type-options"
                 role="group" aria-labelledby="event-type-label"></div>
          </details>
        </div>
        <label>Text <input id="event-text-filter" type="search" placeholder="Filter details"></label>
        <label>Range
          <select id="event-range">
            <option value="86400">Last 24 hours</option>
            <option value="604800" selected>Last 7 days</option>
            <option value="2592000">Last 30 days</option>
            <option value="31536000">Last year</option>
            <option value="all">All</option>
          </select>
        </label>
      </div>
      <div class="event-actions">
        <button type="button" id="event-delete" hidden>Delete selected</button>
        <button type="button" id="event-load-older">Load older</button>
      </div>
      <table id="events" class="events">
        <thead><tr id="events-head"><th><button id="event-sort-time" type="button" class="th-sort">Time ↑</button></th><th>Type</th><th>Detail</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Control ------------------------------------------------------------- -->
    <section id="panel-control" class="panel" role="tabpanel"
             aria-labelledby="tab-control" tabindex="0" hidden>
      <div id="control-section" hidden>
        <h2>UPS control</h2>
        <div id="control-panel"></div>
      </div>
      <p id="control-empty" class="chart-note">
        Control is available when you are signed in and UPS control is enabled.
      </p>
    </section>

    <!-- Config -------------------------------------------------------------- -->
    <section id="panel-config" class="panel" role="tabpanel"
             aria-labelledby="tab-config" tabindex="0" hidden>
      <h2>Configuration</h2>
      <div id="config-body"></div>
    </section>
  </main>

  <!-- Login dialog -->
  <div id="login-modal" class="modal" hidden>
    <form id="login-form" class="modal-card">
      <h3>Sign in</h3>
      <label>Username <input id="login-user" autocomplete="username"></label>
      <label>Password <input id="login-pass" type="password" autocomplete="current-password"></label>
      <div class="modal-actions">
        <button type="button" id="login-cancel">Cancel</button>
        <button type="submit">Sign in</button>
      </div>
      <div id="login-error" class="error" hidden></div>
    </form>
  </div>

  <!-- UPS detail dialog -->
  <div id="detail-modal" class="modal" hidden>
    <div class="modal-card detail-card" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <div class="modal-head">
        <h3 id="detail-title">UPS details</h3>
        <button type="button" id="detail-close" aria-label="Close">✕</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <footer><span id="status-line">Loading…</span></footer>
  <script src="/app.js"></script>
</body>
</html>
