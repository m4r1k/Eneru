site_name: Eneru
site_description: UPS monitoring and shutdown orchestration for NUT
site_url: https://eneru.readthedocs.io/
repo_url: https://github.com/m4r1k/Eneru
repo_name: m4r1k/Eneru

theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview:
      - Home: index.md
      - Getting started: getting-started.md
      - Architecture: architecture.md
  - Configuration:
      - Configuration reference: configuration.md
      - Shutdown triggers: triggers.md
      - Redundancy groups: redundancy-groups.md
      - Notifications: notifications.md
      - Remote servers: remote-servers.md
  - Operations:
      - Monitor and graphs: tui-graphs.md
      - Statistics: statistics.md
      - Troubleshooting: troubleshooting.md
  - Project:
      - Testing: testing.md
      - Roadmap: roadmap.md
      - Changelog: changelog.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/m4r1k/Eneru
